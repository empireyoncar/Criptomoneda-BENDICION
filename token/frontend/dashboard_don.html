<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard DON – BENDICIÓN</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0e11;
      color: #eaecef;
      margin: 0;
      padding: 0;
    }

    header {
      background: #181a20;
      color: #f0b90b;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      border-bottom: 2px solid #f0b90b;
    }

    .container {
      padding: 20px;
      max-width: 1400px;
      margin: auto;
    }

    h2 {
      margin-top: 40px;
      color: #f0b90b;
      border-left: 4px solid #f0b90b;
      padding-left: 10px;
    }

    .box {
      background: #181a20;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(240,185,11,0.1);
    }

    .stat-box {
      display: inline-block;
      width: 30%;
      background: #181a20;
      padding: 20px;
      border-radius: 8px;
      margin: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(240,185,11,0.1);
    }

    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #f0b90b;
    }

    .stat-label {
      font-size: 16px;
      color: #eaecef;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #0b0e11;
      border-radius: 6px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #2b3139;
      text-align: left;
    }

    th {
      background: #181a20;
      color: #f0b90b;
      font-weight: bold;
    }

    tr:hover {
      background: #2b3139;
    }

    button {
      background: #f0b90b;
      color: #181a20;
      border: none;
      padding: 10px 18px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px 0;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #c99700;
    }
  </style>
</head>

<body>

<header>Dashboard Token DON – BENDICIÓN</header>

<div class="container">

  <!-- ESTADÍSTICAS PRINCIPALES -->
  <section class="box">
    <h2>Estadísticas Generales</h2>

    <div id="dashboardStats">
      <div class="stat-box">
        <div class="stat-number" id="totalSupply">0</div>
        <div class="stat-label">Supply Total</div>
      </div>

      <div class="stat-box">
        <div class="stat-number" id="circulacion">0</div>
        <div class="stat-label">DON en Circulación</div>
      </div>

      <div class="stat-box">
        <div class="stat-number" id="burned">0</div>
        <div class="stat-label">DON Quemados</div>
      </div>

      <!-- NUEVO: VALOR DE DON -->
      <div class="stat-box">
        <div class="stat-number" id="donValue">0</div>
        <div class="stat-label">Valor de 1 DON (en BENDICIÓN)</div>
      </div>
    </div>

    <button id="btnLoadDashboard">Actualizar Dashboard</button>
    <button id="btnGoPanel">Ir al Panel del Usuario DON</button>
        <!-- NUEVO BOTÓN -->
    <button id="btnGoHome">Ir a Home</button>
  </section>

  <!-- ÚLTIMAS OPERACIONES -->
  <section class="box">
    <h2>Últimas Operaciones</h2>

    <table id="logsTable">
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Usuario</th>
          <th>Cantidad</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="4">Cargando...</td></tr>
      </tbody>
    </table>
  </section>

</div>

<script>
  function resolveDonApiBase() {
    if (window.location.port === "5009") {
      return `${window.location.protocol}//${window.location.hostname}:5008`;
    }
    return "/CriptoBendicion/don_api";
  }

  const DON_API_BASE = resolveDonApiBase();

    // Navegación al panel
    document.getElementById("btnGoPanel").onclick = () => {
        window.location.href = "/CriptoBendicion/don/panel";
    };

    // Cargar valor de DON
    async function loadDonValue() {
        try {
        let res = await fetch(`${DON_API_BASE}/price`);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
            let data = await res.json();
            document.getElementById("donValue").textContent = data.don_value;
        } catch (err) {
            document.getElementById("donValue").textContent = "Error";
        }
    }

    // Cargar dashboard completo
    document.getElementById("btnLoadDashboard").onclick = () => {
        loadDonValue();
        // Aquí puedes agregar tus otras funciones de carga (supply, logs, etc.)
    };
    document.getElementById("btnGoHome").onclick = () => {
    window.location.href = "/CriptoBendicion/home";
    };

    // Cargar automáticamente al abrir la página
    loadDonValue();
</script>

</body>
</html>
