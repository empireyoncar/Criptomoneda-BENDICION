<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Radar Rapido - Staking</title><style>:root{--bg:#0a0d10;--panel:rgba(19,24,30,.9);--text:#eef2f6;--muted:#95a1ad;--line:rgba(255,255,255,.08);--gold:#f0b90b}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;color:var(--text);background:linear-gradient(180deg,#0a0d10 0%,#10151b 100%)}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 40px}.nav,.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px}.nav{padding:16px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.nav a{color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:12px}.nav a.active{background:rgba(240,185,11,.14);color:var(--gold);font-weight:700}.hero,.panel{padding:22px}.hero{margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.metric{padding:18px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid var(--line)}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}.value{margin-top:8px;font-size:30px;font-weight:800}.note{margin-top:8px;color:var(--muted);line-height:1.5}.empty{padding:22px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px}@media (max-width:820px){.grid{grid-template-columns:1fr}}</style><script src="/CriptoBendicion/staking/seguridad/guard.js"></script><script>window.SEGURIDAD_GUARD.requireLogin();</script></head><body><div class="shell"><nav class="nav"><a href="/CriptoBendicion/staking/dashboard">Dashboard</a><a href="/CriptoBendicion/staking/stake_activos">Stakes activos</a><a href="/CriptoBendicion/staking/historial">Historial</a><a class="active" href="/CriptoBendicion/staking/radar_rapido">Radar rapido</a><a href="/CriptoBendicion/staking/calendario_salida">Calendario salida</a></nav><section class="panel hero"><h1 style="margin:0 0 10px;color:var(--gold)">Radar rapido</h1><p style="margin:0;color:var(--muted)">Lectura ejecutiva del staking activo del usuario: tamaño del bloqueo, ritmo de liberacion y peso del capital comprometido.</p></section><section id="grid" class="grid"></section></div><script>const API_WALLET="https://empireyoncar.duckdns.org/CriptoBendicion/wallet_api";const API_BLOCKCHAIN="https://empireyoncar.duckdns.org/CriptoBendicion/blockchain";const API_STAKING="https://empireyoncar.duckdns.org/CriptoBendicion/staking_api";function uid(){return localStorage.getItem("user_id")}function n(v,d=0){return Number(v||0).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d})}function dt(v){return v?new Date(v).toLocaleString("es-ES"):"-"}async function j(url,msg){const res=await fetch(url);const raw=await res.text();let data={};if(raw){data=JSON.parse(raw)}if(!res.ok)throw new Error(data.error||msg);return data}async function init(){const userId=uid();if(!userId){location.href="/CriptoBendicion/login";return}const wallet=await j(`${API_WALLET}/user_wallet/${userId}`,"No se pudo cargar wallet");if(!wallet.wallet){location.href="/CriptoBendicion/wallet";return}const [walletInfo,activeData]=await Promise.all([j(`${API_BLOCKCHAIN}/wallet/${wallet.wallet}`,"No se pudo cargar saldo"),j(`${API_STAKING}/Staking/user/${userId}`,"No se pudieron cargar stakes activos")]);const stakes=activeData.stakes||[];const locked=stakes.reduce((s,x)=>s+Number(x.amount||0),0);const projected=stakes.reduce((s,x)=>s+Number(x.reward_total||0),0);const accrued=stakes.reduce((s,x)=>s+Number(x.reward_acumulada||0),0);const next=[...stakes].sort((a,b)=>a.end_timestamp-b.end_timestamp)[0]||null;const totalVisible=Number(walletInfo.balance||0)+locked;const ratio=totalVisible>0?(locked/totalVisible)*100:0;const avgDays=stakes.length?stakes.reduce((s,x)=>s+Number(x.days||0),0)/stakes.length:0;document.getElementById("grid").innerHTML=`<div class="metric"><div class="label">Wallet activa</div><div class="value" style="font-size:18px;word-break:break-all">${wallet.wallet}</div><div class="note">Saldo visible: ${n(walletInfo.balance)} BEND</div></div><div class="metric"><div class="label">Capital comprometido</div><div class="value">${n(locked)}</div><div class="note">${n(ratio,2)}% del BEND visible esta bloqueado en staking.</div></div><div class="metric"><div class="label">Rendimiento estimado</div><div class="value">${n(projected,4)} DON</div><div class="note">Acumulado proporcional actual: ${n(accrued,4)} DON.</div></div><div class="metric"><div class="label">Proximo desbloqueo</div><div class="value" style="font-size:18px;">${next?dt(next.end_date):'Sin stakes activos'}</div><div class="note">${next?`${n(next.amount)} BEND · ${next.days} dias`:"No hay posiciones abiertas para calcular proximos vencimientos."}</div></div><div class="metric"><div class="label">Stakes activos</div><div class="value">${n(stakes.length)}</div><div class="note">Duracion media: ${n(avgDays,1)} dias.</div></div><div class="metric"><div class="label">Lectura operativa</div><div class="value" style="font-size:18px;">${stakes.length?'Exposicion moderada':'Sin exposicion activa'}</div><div class="note">Usa este radar para decidir si abrir nuevas posiciones o esperar liberaciones cercanas.</div></div>`}init().catch(err=>{document.getElementById("grid").innerHTML=`<div class="empty">${err.message||err}</div>`})</script></body></html>
