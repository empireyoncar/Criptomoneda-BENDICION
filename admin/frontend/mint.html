<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mint – Panel Admin</title>

    <style>
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
            --danger: #f6465d;
            --success: #0ecb81;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: var(--bg-box);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(240,185,11,0.15);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0f1115;
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #2b3139;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #3a414c;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 14px;
        }

        .top-actions .btn {
            width: auto;
            margin-top: 0;
            padding: 10px 16px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #0f1115;
            border: 1px solid var(--border);
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="top-actions">
        <button class="btn btn-secondary" onclick="volverAdmin()">Volver al Admin central</button>
    </div>
    <h1>Mint de Criptomonedas</h1>
    <p>Como administrador puedes crear nuevas monedas y asignarlas a cualquier wallet.</p>
    <p><strong>Admin ID:</strong> <span id="adminUserId"></span></p>

    <label>Dirección de la wallet</label>
    <input type="text" id="address" placeholder="Ej: 4f8a9b...">

    <label>Cantidad a crear</label>
    <input type="number" id="amount" placeholder="Ej: 1000">

    <button class="btn btn-primary" onclick="mint()">Crear monedas</button>

    <button class="btn btn-secondary" onclick="crearBloque()">Crear bloque</button>

    <div class="result" id="resultBox"></div>
</div>

<script>
    const sessionAdminId = "{{ session['user_id'] }}";
    if (!localStorage.getItem("user_id") && sessionAdminId) {
        localStorage.setItem("user_id", sessionAdminId);
    }

    const adminUserId = localStorage.getItem("user_id");
    if (!adminUserId) {
        alert("Debes iniciar sesión como administrador.");
        window.location.href = "/CriptoBendicion/admin/login";
    } else {
        document.getElementById("adminUserId").textContent = adminUserId;
    }

    const API = "https://empireyoncar.duckdns.org/CriptoBendicion/blockchain";

    function volverAdmin() {
        window.location.href = "/CriptoBendicion/admin/";
    }

    /* 🟩 CREAR TRANSACCIÓN DE MINT DIRECTO AL BLOCKCHAIN */
    async function mint() {
        const address = document.getElementById("address").value.trim();
        const amountRaw = document.getElementById("amount").value.trim();

        console.log("HTML ENVÍA:", { address, amountRaw });

        if (!address) {
            alert("La dirección no puede estar vacía.");
            return;
        }

        if (!amountRaw || isNaN(amountRaw)) {
            alert("La cantidad debe ser un número válido.");
            return;
        }

        const payload = {
            address: address,
            amount: Number(amountRaw)
        };

        try {
            const res = await fetch(`${API}/mint`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            console.log("BLOCKCHAIN RESPONDE:", data);

            if (!res.ok) {
                mostrarResultado({ error: data.error || "No se pudo crear el mint." });
                return;
            }

            mostrarResultado({ message: "Mint creado correctamente." });

        } catch (err) {
            mostrarResultado({ error: "Error al comunicar con blockchain." });
        }
    }

    /* 🟩 CREAR BLOQUE DIRECTO AL BLOCKCHAIN */
    async function crearBloque() {
        try {
            const res = await fetch(`${API}/commit`, { method: "POST" });
            const data = await res.json();

            console.log("BLOCKCHAIN COMMIT:", data);

            if (!res.ok) {
                mostrarResultado({ error: data.error || "No se pudo crear el bloque." });
                return;
            }

            mostrarResultado({ message: "Bloque creado correctamente." });

        } catch (err) {
            mostrarResultado({ error: "Error al comunicar con blockchain." });
        }
    }

    /* 🟩 MOSTRAR RESULTADO */
    function mostrarResultado(data) {
        const box = document.getElementById("resultBox");
        box.style.display = "block";

        if (data.error) {
            box.style.color = "#f6465d";
            box.textContent = "Error: " + data.error;
        } else {
            box.style.color = "#0ecb81";
            box.textContent = "Éxito: " + data.message;
        }
    }
</script>

</body>
</html>
