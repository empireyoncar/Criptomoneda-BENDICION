name: p2p_bendicion

services:
  p2p_db:
    image: postgres:16
    container_name: p2p_db
    command: postgres -p 5544
    environment:
      POSTGRES_DB: p2p_db
      POSTGRES_USER: p2p_user
      POSTGRES_PASSWORD: p2p_password
    ports:
      - "5544:5544"
    volumes:
      - p2p_postgres_data:/var/lib/postgresql/data
      - ./backend/p2p_schema.sql:/docker-entrypoint-initdb.d/01_p2p_schema.sql:ro
    restart: always
    networks:
      - p2p_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p_user -d p2p_db -p 5544"]
      interval: 10s
      timeout: 5s
      retries: 10

  p2p_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: p2p_api
    command: python p2p_server.py
    environment:
      P2P_DB_HOST: p2p_db
      P2P_DB_PORT: 5544
      P2P_DB_NAME: p2p_db
      P2P_DB_USER: p2p_user
      P2P_DB_PASSWORD: p2p_password
      P2P_JWT_SECRET: super_secret_dev_change_me
      BLOCKCHAIN_URL: http://host.docker.internal:5004
      P2P_ESCROW_PRIVATE_KEY: 4bd540d1b61c21eac07b7a3c67642a28f8960ab927d2984f526c628fc630cf98
      P2P_ESCROW_PUBLIC_KEY: 4eb135383f4fa7eb0a97394c0c62660e3dd074c9cbc2d04ded9856e50be2348480fd49854d6b357b69b2ceb8b170d5208d043580432137ee1e4a73af6b234114
      P2P_ESCROW_WALLET: df9f6e498a481d1e97325e6ed16cd7e68c1bbe2a1a600b4fcc42736ef10430f5
    ports:
      - "5012:5012"
    volumes:
      - ./backend:/app
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - p2p_net
    depends_on:
      p2p_db:
        condition: service_healthy

  p2p_web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: p2p_web
    command: python p2p_webserver.py
    environment:
      P2P_DB_HOST: p2p_db
      P2P_DB_PORT: 5544
      P2P_DB_NAME: p2p_db
      P2P_DB_USER: p2p_user
      P2P_DB_PASSWORD: p2p_password
      P2P_JWT_SECRET: super_secret_dev_change_me
      BLOCKCHAIN_URL: http://host.docker.internal:5004
      P2P_ESCROW_PRIVATE_KEY: 4bd540d1b61c21eac07b7a3c67642a28f8960ab927d2984f526c628fc630cf98
      P2P_ESCROW_PUBLIC_KEY: 4eb135383f4fa7eb0a97394c0c62660e3dd074c9cbc2d04ded9856e50be2348480fd49854d6b357b69b2ceb8b170d5208d043580432137ee1e4a73af6b234114
      P2P_ESCROW_WALLET: df9f6e498a481d1e97325e6ed16cd7e68c1bbe2a1a600b4fcc42736ef10430f5
    ports:
      - "5013:5013"
    volumes:
      - ./backend:/app
      - ./frontend:/app/p2p/frontend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - p2p_net
    depends_on:
      p2p_db:
        condition: service_healthy
      p2p_api:
        condition: service_started

  p2p_chat:
    build:
      context: ./backend
      dockerfile: chat.Dockerfile
    container_name: p2p_chat
    command: python p2p_chatserver.py
    environment:
      P2P_DB_HOST: p2p_db
      P2P_DB_PORT: 5544
      P2P_DB_NAME: p2p_db
      P2P_DB_USER: p2p_user
      P2P_DB_PASSWORD: p2p_password
      P2P_JWT_SECRET: super_secret_dev_change_me
      BLOCKCHAIN_URL: http://host.docker.internal:5004
      P2P_ESCROW_PRIVATE_KEY: 4bd540d1b61c21eac07b7a3c67642a28f8960ab927d2984f526c628fc630cf98
      P2P_ESCROW_PUBLIC_KEY: 4eb135383f4fa7eb0a97394c0c62660e3dd074c9cbc2d04ded9856e50be2348480fd49854d6b357b69b2ceb8b170d5208d043580432137ee1e4a73af6b234114
      P2P_ESCROW_WALLET: df9f6e498a481d1e97325e6ed16cd7e68c1bbe2a1a600b4fcc42736ef10430f5
    ports:
      - "5014:5014"
    volumes:
      - ./backend:/app
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - p2p_net
    depends_on:
      p2p_db:
        condition: service_healthy
      p2p_api:
        condition: service_started

networks:
  p2p_net:
    driver: bridge

volumes:
  p2p_postgres_data:
