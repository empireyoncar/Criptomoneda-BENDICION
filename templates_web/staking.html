<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Staking - Bendición</title>
    <style>
        body {
            background: #0b0e11;
            color: #eaecef;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #181a20;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #f0b90b;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Staking Bendición</h2>

    <label>Monto a stakear</label>
    <input type="number" id="amount" placeholder="Ej: 100">

    <label>Tiempo</label>
    <select id="days">
        <option value="30">30 días (5%)</option>
        <option value="60">60 días (12%)</option>
        <option value="90">90 días (20%)</option>
    </select>

    <button id="btnStake">Iniciar Staking</button>

    <p id="msg"></p>
</div>

<script>
const API = "https://empireyoncar.duckdns.org/Staking/stake";

document.getElementById("btnStake").onclick = async () => {
    const amount = document.getElementById("amount").value;
    const days = document.getElementById("days").value;

    const res = await fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: localStorage.getItem("user_id"),
            amount,
            days
        })
    });

    const data = await res.json();
    alert(JSON.stringify(data));
};
</script>

</body>
</html>
