<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat P2P</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b0e11;color:#eaecef;margin:0;padding:20px;}
    .wrap{max-width:800px;margin:0 auto;}
    .box{background:#181a20;border-radius:10px;padding:16px;}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;}
    .back{display:inline-block;padding:10px 14px;border-radius:6px;background:#2b3139;color:#eaecef;text-decoration:none;font-weight:bold;}
    .presence{font-size:12px;color:#9aa4af;margin-top:4px;}
    .presenceDot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#4b5563;margin-right:6px;vertical-align:middle;}
    .presenceDot.online{background:#0f9d58;box-shadow:0 0 8px rgba(15,157,88,.7);}
    #messages{height:340px;overflow:auto;background:#0f1115;border:1px solid #2b3139;padding:10px;border-radius:6px;margin-bottom:10px;}
    .msg{margin-bottom:8px;font-size:14px;}
    .meta{color:#8b8d90;font-size:12px;}
    input{width:100%;padding:10px;border-radius:6px;border:1px solid #2b3139;background:#0f1115;color:#eaecef;}
    button{margin-top:10px;padding:10px 14px;border:none;border-radius:6px;background:#f0b90b;color:#000;font-weight:bold;cursor:pointer;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <div class="topbar">
      <div>
        <h1>Chat de Orden</h1>
        <p>Orden: <span id="orderId">{{ order_id }}</span></p>
        <div class="presence"><span id="counterpartyDot" class="presenceDot"></span><span id="counterpartyPresenceText">Comprobando estado...</span></div>
      </div>
      <a class="back" id="btnBackToOrder" href="#">Volver a detalle de orden BEN</a>
    </div>
    <div id="messages"></div>
    <input id="txt" placeholder="Escribe un mensaje...">
    <button id="btnSend">Enviar</button>
  </div>
</div>

<script>
  const userId = localStorage.getItem("user_id") || "usuario_demo";
  const orderId = document.getElementById("orderId").textContent.trim();
  const messages = document.getElementById("messages");
  const chatWsBase = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/CriptoBendicion/p2p_chat";
  const API = "/CriptoBendicion/p2p_api";
  document.getElementById("btnBackToOrder").href = `/CriptoBendicion/p2p/order/${orderId}`;

  async function heartbeat() {
    await fetch(`${API}/presence/heartbeat`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({user_id: userId})
    });
  }

  async function refreshPresence() {
    const res = await fetch(`${API}/orders/${orderId}/presence?requester_user_id=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (!res.ok) return;

    const isBuyer = data.presence.buyer_id === userId;
    const counterpartyId = isBuyer ? data.presence.seller_id : data.presence.buyer_id;
    const counterpartyOnline = isBuyer ? data.presence.seller_online : data.presence.buyer_online;
    const dot = document.getElementById("counterpartyDot");
    const text = document.getElementById("counterpartyPresenceText");
    dot.classList.toggle("online", Boolean(counterpartyOnline));
    text.textContent = `${counterpartyId} ${counterpartyOnline ? "en linea" : "desconectado"}`;
  }

  async function syncPresence() {
    try {
      await heartbeat();
      await refreshPresence();
    } catch (_error) {
    }
  }

  const messagesById = new Map();
  let ws = null;
  let reconnectTimeoutId = null;

  function getMessageId(msg) {
    return String(msg.id || `${msg.sender_user_id || msg.user_id || "sistema"}-${msg.created_at || ""}-${msg.message || ""}`);
  }

  function renderMessages() {
    const ordered = Array.from(messagesById.values()).sort((a, b) => {
      const ad = new Date(a.created_at || 0).getTime();
      const bd = new Date(b.created_at || 0).getTime();
      return ad - bd;
    });

    messages.innerHTML = "";
    ordered.forEach((msg) => {
      const div = document.createElement("div");
      div.className = "msg";
      const who = msg.sender_user_id || msg.user_id || "sistema";
      const text = msg.message || msg.error || "";
      div.innerHTML = `<strong>${who}:</strong> ${text}<div class="meta">${msg.created_at || new Date().toISOString()}</div>`;
      messages.appendChild(div);
    });
    messages.scrollTop = messages.scrollHeight;
  }

  function upsertMessage(msg) {
    const msgId = getMessageId(msg);
    messagesById.set(msgId, msg);
  }

  async function loadChatHistory() {
    try {
      const res = await fetch(`${API}/orders/${orderId}/chat?requester_user_id=${encodeURIComponent(userId)}&limit=200`);
      const data = await res.json();
      if (!res.ok) return;

      (data.messages || []).forEach((msg) => upsertMessage(msg));
      renderMessages();
    } catch (_error) {
    }
  }

  function connectWs() {
    ws = new WebSocket(`${chatWsBase}/ws/order/${orderId}?user_id=${encodeURIComponent(userId)}`);

    ws.onmessage = (ev) => {
      const payload = JSON.parse(ev.data);
      if (payload.type === "message") {
        upsertMessage(payload.message);
        renderMessages();
      }
      if (payload.type === "error") {
        upsertMessage({
          id: `error-${Date.now()}`,
          user_id: "error",
          message: payload.error,
          created_at: new Date().toISOString()
        });
        renderMessages();
      }
    };

    ws.onclose = () => {
      if (reconnectTimeoutId) window.clearTimeout(reconnectTimeoutId);
      reconnectTimeoutId = window.setTimeout(connectWs, 2000);
    };

    ws.onerror = () => {
      try { ws.close(); } catch (_e) {}
    };
  }

  async function sendMessage() {
    const txt = document.getElementById("txt");
    const value = txt.value.trim();
    if (!value) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({message: value}));
    } else {
      await fetch(`${API}/orders/${orderId}/chat`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sender_user_id: userId, message: value})
      });
      await loadChatHistory();
    }
    txt.value = "";
  }

  document.getElementById("btnSend").onclick = () => {
    sendMessage().catch(() => {});
  };

  document.getElementById("txt").addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") {
      ev.preventDefault();
      sendMessage().catch(() => {});
    }
  });

  connectWs();
  loadChatHistory();
  window.setInterval(loadChatHistory, 3000);

  syncPresence();
  window.setInterval(syncPresence, 15000);
</script>
</body>
</html>
