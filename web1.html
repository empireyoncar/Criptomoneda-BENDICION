<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hologram Motion Login</title>

<style>
    :root {
        --bg: #0b0e11;
        --box: #181a20;
        --primary: #f0b90b;
        --text: #eaecef;
        --muted: #8b8d90;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg);
        font-family: Arial, sans-serif;
        color: var(--text);
        overflow: hidden;
    }

    /* -----------------------------------
       HOLOGRAM MOTION (ondas holográficas)
    ----------------------------------- */
    .holo {
        position: fixed;
        width: 200%;
        height: 200%;
        background: conic-gradient(
            from 0deg,
            rgba(240,185,11,0.15),
            rgba(240,185,11,0.05),
            transparent,
            rgba(240,185,11,0.15)
        );
        filter: blur(120px);
        animation: holoSpin 18s linear infinite;
        opacity: 0.35;
        z-index: -2;
    }

    .holo:nth-child(2) {
        animation-duration: 28s;
        opacity: 0.25;
    }

    .holo:nth-child(3) {
        animation-duration: 36s;
        opacity: 0.18;
    }

    @keyframes holoSpin {
        from { transform: rotate(0deg) scale(1.2); }
        to { transform: rotate(360deg) scale(1.2); }
    }

    /* -----------------------------------
       CAJA DE LOGIN
    ----------------------------------- */
    .box {
        width: 360px;
        padding: 35px;
        background: rgba(24,26,32,0.75);
        border-radius: 14px;
        border: 1px solid rgba(240,185,11,0.25);
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(240,185,11,0.2);
        z-index: 10;
        animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        text-align: center;
        color: var(--primary);
        margin-bottom: 25px;
        text-shadow: 0 0 12px rgba(240,185,11,0.5);
    }

    label {
        font-size: 14px;
        color: var(--muted);
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #2b3139;
        background: #0f1115;
        color: var(--text);
        transition: 0.2s;
    }

    input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 8px rgba(240,185,11,0.4);
    }

    button {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #c99700;
    }

    p {
        text-align: center;
        margin-top: 12px;
    }

    a {
        color: var(--primary);
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<!-- Capas holográficas -->
<div class="holo"></div>
<div class="holo"></div>
<div class="holo"></div>

<!-- Caja de login -->
<div class="box">
    <h1>Hologram Login</h1>

    <label>Email</label>
    <input type="email">

    <label>Contraseña</label>
    <input type="password">

    <button>Entrar</button>

    <p>¿No tienes cuenta? <a href="#">Regístrate</a></p>
</div>

</body>
</html>
