<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login – BENDICIÓN</title>

    <style>
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
            --error: #ff4d4f;
            --success: #52c41a;
        }

        body.light {
            --bg: #f4f4f4;
            --bg-box: white;
            --text: #222;
            --text-muted: #555;
            --primary: #d4a20a;
            --primary-hover: #b58900;
            --border: #ccc;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1d23 0%, var(--bg) 100%);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.7;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(0); opacity: 0.7; }
            to { transform: translateY(-800px); opacity: 0; }
        }

        .box {
            background: var(--bg-box);
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 0 20px rgba(240,185,11,0.15);
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px var(--primary); }
            to { text-shadow: 0 0 15px var(--primary); }
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(240,185,11,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: rgba(255,77,79,0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .alert.success {
            background: rgba(82,196,26,0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .center {
            text-align: center;
            margin-top: 10px;
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 11px 16px;
            background: #fff;
            color: #444;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .google-btn:hover {
            background: #f1f1f1;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            text-decoration: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
    </style>
    <script src="/CriptoBendicion/seguridad/guard.js"></script>
</head>

<body>

<div id="particles"></div>

<div class="box">

    <h1>Iniciar sesión</h1>

    <div id="alertBox" class="alert"></div>

    <!-- Google OAuth -->
    <a href="/CriptoBendicion/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continuar con Google
    </a>

    <div class="divider">— o —</div>

    <label>Email:</label>
    <input type="email" id="email">

    <label>Contraseña:</label>
    <input type="password" id="password">

    <button id="btnLogin">Entrar</button>

    <p class="center">
      ¿Olvidaste tu contraseña?
      <a href="https://discord.gg/ze4YDqJYBy" target="_blank">Recuperar</a>
    </p>

    <p class="center">
      ¿No tienes cuenta?
      <a href="register">Regístrate</a>
    </p>

</div>

<script>
    // Al abrir login: limpiar sesión previa sin redirección para evitar bucles.
    fetch("/CriptoBendicion/seguridad_api/logout", {
        method: "POST",
        credentials: "include",
    }).catch(function(){});
    localStorage.removeItem("user_id");

    // Mostrar errores redirigidos desde Google OAuth
    (function() {
        const params = new URLSearchParams(window.location.search);
        const errCode = params.get("error");
        if (errCode) {
            const msgs = {
                google_denied:      "Cancelaste el inicio de sesión con Google.",
                state_mismatch:     "Error de seguridad en el inicio con Google. Intenta de nuevo.",
                no_code:            "Google no devolvió un código. Intenta de nuevo.",
                token_exchange:     "Error al conectar con Google. Intenta más tarde.",
                no_access_token:    "No se pudo obtener el token de Google.",
                userinfo_failed:    "No se pudo leer tu perfil de Google.",
                missing_google_data:"Google no envió tu email. Verifica tu cuenta.",
                db_error:           "Error interno al registrar tu cuenta. Intenta más tarde.",
            };
            const alertBox = document.getElementById("alertBox");
            alertBox.textContent = msgs[errCode] || "Error en el inicio de sesión con Google.";
            alertBox.className = "alert error";
            alertBox.style.display = "block";
            history.replaceState(null, "", window.location.pathname);
        }
    })();
    /* ------------------------------
       PARTICULAS
    ------------------------------ */
    const particles = document.getElementById("particles");

    function createParticle() {
        const p = document.createElement("div");
        p.classList.add("particle");
        p.style.left = Math.random() * 100 + "%";
        p.style.top = "100%";
        p.style.animationDuration = 4 + Math.random() * 6 + "s";
        p.style.opacity = Math.random();
        particles.appendChild(p);

        setTimeout(() => p.remove(), 10000);
    }

    setInterval(createParticle, 150);

    /* ------------------------------
       LOGIN
    ------------------------------ */
    const API = "/CriptoBendicion/usuarios"; // backend público

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const alertBox = document.getElementById("alertBox");

    function showAlert(msg, type="error") {
        alertBox.textContent = msg;
        alertBox.className = "alert " + type;
        alertBox.style.display = "block";
    }

    document.getElementById("btnLogin").onclick = async () => {
        const emailVal = email.value.trim();
        const passVal = password.value.trim();

        if (!emailVal || !passVal) {
            showAlert("Completa todos los campos.");
            return;
        }

        try {
            const data = await window.SEGURIDAD_GUARD.login(emailVal, passVal);
            showAlert("Login correcto", "success");
            setTimeout(() => {
                window.location.href = "/CriptoBendicion/home";
            }, 800);
        } catch (e) {
            showAlert(e.message || "No se pudo conectar con el servidor.");
            console.error("Error en login:", e);
        }
    };
</script>

</body>
</html>
