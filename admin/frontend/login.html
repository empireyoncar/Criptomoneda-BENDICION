<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Administrador – BENDICIÓN</title>

    <style>
        /* ------------------------------
           VARIABLES DE TEMA
        ------------------------------ */
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
            --error: #ff4d4f;
            --success: #52c41a;
        }

        body.light {
            --bg: #f4f4f4;
            --bg-box: white;
            --text: #222;
            --text-muted: #555;
            --primary: #d4a20a;
            --primary-hover: #b58900;
            --border: #ccc;
        }

        /* ------------------------------
           ESTILOS GENERALES
        ------------------------------ */
        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Fondo animado de partículas */
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1d23 0%, var(--bg) 100%);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.7;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(0); opacity: 0.7; }
            to { transform: translateY(-800px); opacity: 0; }
        }

        /* Pantalla de carga */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            animation: fadeOut 1s ease forwards;
            animation-delay: 1.5s;
        }

        #loader div {
            width: 50px;
            height: 50px;
            border: 5px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* Caja de login */
        .login-box {
            background: var(--bg-box);
            padding: 35px;
            border-radius: 10px;
            width: 380px;
            margin: auto;
            margin-top: 10vh;
            box-shadow: 0 0 20px rgba(240,185,11,0.15);
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px var(--primary); }
            to { text-shadow: 0 0 15px var(--primary); }
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 22px;
        }

        label {
            font-size: 14px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 5px rgba(240,185,11,0.4);
        }

        input.error {
            border-color: var(--error);
            box-shadow: 0 0 5px rgba(255,77,79,0.4);
        }

        input.success {
            border-color: var(--success);
            box-shadow: 0 0 5px rgba(82,196,26,0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--bg-box);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Alertas */
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .alert.error {
            background: rgba(255,77,79,0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .alert.success {
            background: rgba(82,196,26,0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }
    </style>
</head>

<body>

<div id="loader"><div></div></div>

<div id="particles"></div>

<button id="themeToggle">Modo Claro</button>

<div class="login-box">

    <div class="logo">BENDICIÓN</div>

    <h2>Panel de Administración</h2>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm" action="/CriptoBendicion/admin_login" method="POST">
        <label>Email:</label>
        <input type="text" id="email" name="email" placeholder="admin@bendicion.com" required>

        <label>Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit">Ingresar</button>
    </form>

    <p class="footer-text">Acceso exclusivo para administradores</p>
</div>

<script>
    /* ------------------------------
       GENERAR PARTÍCULAS ANIMADAS
    ------------------------------ */
    const particles = document.getElementById("particles");

    function createParticle() {
        const p = document.createElement("div");
        p.classList.add("particle");
        p.style.left = Math.random() * 100 + "%";
        p.style.top = "100%";
        p.style.animationDuration = 4 + Math.random() * 6 + "s";
        p.style.opacity = Math.random();
        particles.appendChild(p);

        setTimeout(() => p.remove(), 10000);
    }

    setInterval(createParticle, 150);

    

    /* ------------------------------
       VALIDACIÓN VISUAL
    ------------------------------ */
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const alertBox = document.getElementById("alertBox");

    function showAlert(msg, type="error") {
        alertBox.textContent = msg;
        alertBox.className = "alert " + type;
        alertBox.style.display = "block";
    }

    email.addEventListener("input", () => {
        email.classList.remove("error", "success");
        if (email.value.includes("@") && email.value.includes(".")) {
            email.classList.add("success");
        } else {
            email.classList.add("error");
        }
    });

    password.addEventListener("input", () => {
        password.classList.remove("error", "success");
        if (password.value.length >= 4) {
            password.classList.add("success");
        } else {
            password.classList.add("error");
        }
    });

    /* ------------------------------
       VALIDACIÓN ANTES DE ENVIAR
    ------------------------------ */
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!email.value.includes("@")) {
            showAlert("El email no es válido");
            email.classList.add("error");
            return;
        }

        if (password.value.length < 4) {
            showAlert("La contraseña es demasiado corta");
            password.classList.add("error");
            return;
        }

        try {
            const res = await fetch("/CriptoBendicion/admin_login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({
                    email: email.value,
                    password: password.value
                })
            });

            const data = await res.json();

            if (data.error) {
                showAlert(data.error);
                return;
            }

            if (data.user_id) {
                localStorage.setItem("user_id", data.user_id);
                showAlert("Login correcto", "success");

                setTimeout(() => {
                    window.location.href = data.redirect || "/CriptoBendicion/admin/";
                }, 800);
            } else {
                showAlert("Respuesta inválida del servidor");
            }
        } catch (err) {
            showAlert("No se pudo conectar con el servidor");
        }
    });
</script>

</body>
</html>
