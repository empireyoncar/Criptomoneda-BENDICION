<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mercado P2P – BENDICIÓN</title>
    <style>
        /* PANEL DE NAVEGACIÓN */
        .nav-panel {
            display: flex;
            gap: 10px;
            background: #111;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .nav-panel button {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-panel button:hover {
            background: #333;
        }

        /* ESTILOS ORIGINALES */
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --bg-soft: #0f1115;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
            --danger: #f6465d;
            --success: #0ecb81;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .logo { font-weight: bold; letter-spacing: 1px; color: var(--primary); }
        .user-info { font-size: 14px; color: var(--text-muted); }
        .user-info span { color: var(--text); font-weight: bold; }
        h1 { margin: 0 0 8px 0; font-size: 24px; }
        .subtitle { margin: 0; color: var(--text-muted); font-size: 14px; }

        .top-card {
            background: var(--bg-box);
            border-radius: 12px;
            padding: 16px 18px;
            margin-top: 16px;
            box-shadow: 0 0 18px rgba(0,0,0,0.5);
        }

        .tabs {
            display: inline-flex;
            border-radius: 999px;
            background: var(--bg-soft);
            padding: 3px;
            margin-bottom: 16px;
        }
        .tab {
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
        }
        .tab.active {
            background: var(--primary);
            color: #000;
            font-weight: bold;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .filters label { font-size: 12px; color: var(--text-muted); }
        .filters select,
        .filters input {
            background: #0f1115;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--text);
            font-size: 13px;
            min-width: 120px;
        }
        .filters .btn-filter {
            padding: 7px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            background: var(--primary);
            color: #000;
        }
        .filters .btn-filter:hover { background: var(--primary-hover); }

        .table-wrapper {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; background: var(--bg-box); }
        thead { background: #111318; }
        th, td {
            padding: 10px 12px;
            font-size: 13px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-muted); font-weight: normal; }
        tbody tr:hover { background: #14171f; }

        .tag-buy { color: var(--success); font-weight: bold; font-size: 12px; }
        .tag-sell { color: var(--danger); font-weight: bold; font-size: 12px; }

        .btn {
            padding: 7px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: var(--primary-hover); }

        .payment-methods { font-size: 12px; color: var(--text-muted); }
        .limit { font-size: 12px; color: var(--text-muted); }

        .create-offer-card {
            margin-top: 24px;
            background: var(--bg-box);
            border-radius: 12px;
            padding: 16px 18px;
        }
        .create-offer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .field input,
        .field select,
        .field textarea {
            width: 100%;
            background: #0f1115;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 8px;
            color: var(--text);
            font-size: 13px;
        }
        .field textarea { resize: vertical; min-height: 60px; }
        .create-offer-actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>

<body>

<!-- PANEL DE NAVEGACIÓN -->
<div class="nav-panel">
    <button id="btnGoHome">Inicio</button>
    <button id="btnGoWallet">Wallet</button>
    <button id="btnGoEnvio">Enviar</button>
    <button id="btnGoP2P">P2P</button>
    <button id="btnGoChain">Blockchain</button>
    <button id="btnGoLogin">Login</button>
    <button id="btnGoRegister">Registro</button>
</div>

<div class="layout">
    <header>
        <div>
            <div class="logo">BENDICIÓN P2P</div>
            <h1>Mercado P2P</h1>
            <p class="subtitle">Compra y vende BENDICIÓN Coin directamente con otros usuarios.</p>
        </div>
        <div class="user-info">
            Usuario: <span id="userId">-</span>
        </div>
    </header>

    <div class="top-card">
        <div class="tabs">
            <button class="tab active" id="tabCompra" onclick="cambiarModo('compra')">Comprar</button>
            <button class="tab" id="tabVenta" onclick="cambiarModo('venta')">Vender</button>
        </div>

        <div class="filters">
            <div>
                <label>Moneda fiat</label><br>
                <select id="filtroFiat">
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                    <option value="MXN">MXN</option>
                </select>
            </div>

            <div>
                <label>Método de pago</label><br>
                <select id="filtroPago">
                    <option value="todos">Todos</option>
                    <option value="SEPA">Transferencia SEPA</option>
                    <option value="BIZUM">Bizum</option>
                    <option value="REVOLUT">Revolut</option>
                </select>
            </div>

            <div>
                <label>Buscar usuario</label><br>
                <input type="text" id="filtroUsuario" placeholder="ID o nombre">
            </div>

            <button class="btn-filter" onclick="aplicarFiltros()">Filtrar</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Tipo</th>
                        <th>Precio (EUR)</th>
                        <th>Cantidad BDC</th>
                        <th>Límite</th>
                        <th>Métodos de pago</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tbodyOfertas"></tbody>
            </table>
        </div>
    </div>

    <div class="create-offer-card">
        <h2>Publicar una oferta</h2>
        <p class="subtitle">Crea tu propia oferta de compra o venta para que otros usuarios operen contigo.</p>

        <div class="create-offer-grid">
            <div class="field">
                <label>Tipo de oferta</label>
                <select id="ofertaTipo">
                    <option value="compra">Comprar BDC</option>
                    <option value="venta">Vender BDC</option>
                </select>
            </div>

            <div class="field">
                <label>Cantidad BDC</label>
                <input type="number" id="ofertaCantidad" min="0" step="0.0001" placeholder="Ej: 100">
            </div>

            <div class="field">
                <label>Precio por BDC (EUR)</label>
                <input type="number" id="ofertaPrecio" min="0" step="0.0001" placeholder="Ej: 1.05">
            </div>

            <div class="field">
                <label>Límite mínimo (EUR)</label>
                <input type="number" id="ofertaMin" min="0" step="0.01" placeholder="Ej: 50">
            </div>

            <div class="field">
                <label>Límite máximo (EUR)</label>
                <input type="number" id="ofertaMax" min="0" step="0.01" placeholder="Ej: 500">
            </div>

            <div class="field">
                <label>Métodos de pago (separados por coma)</label>
                <input type="text" id="ofertaPagos" placeholder="Ej: SEPA, Bizum">
            </div>

            <div class="field" style="grid-column: 1 / -1;">
                <label>Comentario</label>
                <textarea id="ofertaComentario" placeholder="Ej: Solo bancos españoles, respondo rápido."></textarea>
            </div>
        </div>

        <div class="create-offer-actions">
            <button class="btn btn-primary" onclick="publicarOferta()">Publicar oferta</button>
        </div>
    </div>
</div>

<script>
/* ===========================
   CONFIGURACIÓN DEL BACKEND
=========================== */

// PARA USAR EN TU RED LOCAL (LAN)
// const API_URL = "http://192.168.X.X:9999";

// PARA USAR CON DUCKDNS + NGINX
const API_URL = "https://empireyoncar.duckdns.org/mercado2p2";

/* ===========================
   PANEL DE NAVEGACIÓN
=========================== */
document.getElementById("btnGoHome").onclick = () => window.location.href = "home.html";
document.getElementById("btnGoWallet").onclick = () => window.location.href = "wallet.html";
document.getElementById("btnGoEnvio").onclick = () => window.location.href = "envio.html";
document.getElementById("btnGoP2P").onclick = () => window.location.href = "p2p.html";
document.getElementById("btnGoChain").onclick = () => window.location.href = "blockchainbendicion.html";
document.getElementById("btnGoLogin").onclick = () => window.location.href = "login.html";
document.getElementById("btnGoRegister").onclick = () => window.location.href = "register.html";

/* ===========================
   SISTEMA P2P CON BACKEND
=========================== */

let userId = localStorage.getItem("user_id") || "usuario_demo";
document.getElementById("userId").textContent = userId;

let ofertas = [];
let modoActual = "compra";

/* Cargar ofertas desde el servidor */
async function cargarOfertas() {
    try {
        const res = await fetch(`${API_URL}/ofertas`);
        ofertas = await res.json();
        renderOfertas();
    } catch (err) {
        console.error("Error cargando ofertas:", err);
    }
}

/* Cambiar modo compra/venta */
function cambiarModo(modo) {
    modoActual = modo;
    document.getElementById("tabCompra").classList.toggle("active", modo === "compra");
    document.getElementById("tabVenta").classList.toggle("active", modo === "venta");
    renderOfertas();
}

/* Aplicar filtros */
function aplicarFiltros() {
    renderOfertas();
}

/* Renderizar ofertas */
function renderOfertas() {
    const tbody = document.getElementById("tbodyOfertas");
    tbody.innerHTML = "";

    const filtroFiat = document.getElementById("filtroFiat").value;
    const filtroPago = document.getElementById("filtroPago").value;
    const filtroUsuario = document.getElementById("filtroUsuario").value.trim().toLowerCase();

    const tipoBuscado = modoActual === "compra" ? "venta" : "compra";

    const filtradas = ofertas.filter(o => {
        if (o.tipo !== tipoBuscado) return false;
        if (o.fiat !== filtroFiat) return false;

        if (filtroPago !== "todos") {
            if (!o.pagos.some(p => p.toUpperCase() === filtroPago.toUpperCase())) return false;
        }

        if (filtroUsuario && !o.usuario.toLowerCase().includes(filtroUsuario)) return false;

        return true;
    });

    if (filtradas.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 7;
        td.style.textAlign = "center";
        td.style.color = "#8b8d90";
        td.textContent = "No hay ofertas disponibles.";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
    }

    filtradas.forEach(o => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${o.usuario}</td>
            <td>${o.tipo === "compra" ? '<span class="tag-buy">COMPRA</span>' : '<span class="tag-sell">VENTA</span>'}</td>
            <td>${parseFloat(o.precio).toFixed(4)}</td>
            <td>${parseFloat(o.cantidad).toFixed(4)}</td>
            <td>
                <div class="limit">
                    Mín: ${parseFloat(o.min).toFixed(2)} EUR<br>
                    Máx: ${parseFloat(o.max).toFixed(2)} EUR
                </div>
            </td>
            <td><div class="payment-methods">${o.pagos.join(", ")}</div></td>
            <td><button class="btn btn-primary" onclick='iniciarOperacion(${JSON.stringify(o)})'>${modoActual === "compra" ? "Comprar" : "Vender"}</button></td>
        `;

        tbody.appendChild(tr);
    });
}

/* Publicar oferta al backend */
async function publicarOferta() {
    const tipo = document.getElementById("ofertaTipo").value;
    const cantidad = parseFloat(document.getElementById("ofertaCantidad").value);
    const precio = parseFloat(document.getElementById("ofertaPrecio").value);
    const min = parseFloat(document.getElementById("ofertaMin").value);
    const max = parseFloat(document.getElementById("ofertaMax").value);
    const pagosStr = document.getElementById("ofertaPagos").value;
    const comentario = document.getElementById("ofertaComentario").value.trim();
    const fiat = document.getElementById("filtroFiat").value;

    if (!cantidad || !precio || !min || !max || !pagosStr) {
        alert("Completa todos los campos obligatorios.");
        return;
    }

    if (min > max) {
        alert("El límite mínimo no puede ser mayor que el máximo.");
        return;
    }

    const pagos = pagosStr.split(",").map(p => p.trim()).filter(p => p);

    const oferta = {
        id: Date.now(),
        usuario: userId,
        tipo,
        cantidad,
        precio,
        min,
        max,
        pagos,
        comentario,
        fiat
    };

    try {
        await fetch(`${API_URL}/ofertas`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(oferta)
        });

        // Recargar ofertas desde el servidor
        await cargarOfertas();

        // Limpiar formulario
        document.getElementById("ofertaCantidad").value = "";
        document.getElementById("ofertaPrecio").value = "";
        document.getElementById("ofertaMin").value = "";
        document.getElementById("ofertaMax").value = "";
        document.getElementById("ofertaPagos").value = "";
        document.getElementById("ofertaComentario").value = "";

        alert("Oferta publicada correctamente.");
    } catch (err) {
        console.error("Error publicando oferta:", err);
        alert("Error al publicar la oferta. Verifica el servidor.");
    }
}

/* Iniciar operación */
function iniciarOperacion(oferta) {
    let mensaje = `Vas a iniciar una operación con ${oferta.usuario}.\n\n`;
    mensaje += `Tipo: ${oferta.tipo.toUpperCase()} BDC\n`;
    mensaje += `Precio: ${oferta.precio} EUR\n`;
    mensaje += `Cantidad disponible: ${oferta.cantidad} BDC\n`;
    mensaje += `Límites: ${oferta.min} - ${oferta.max} EUR\n`;
    mensaje += `Métodos de pago: ${oferta.pagos.join(", ")}\n\n`;

    if (oferta.comentario) {
        mensaje += `Comentario del anunciante:\n${oferta.comentario}\n\n`;
    }

    mensaje += "Aquí podrías abrir un chat, escrow, etc.";

    alert(mensaje);
}

/* Cargar ofertas al iniciar */
cargarOfertas();
</script>

</body>
</html>
