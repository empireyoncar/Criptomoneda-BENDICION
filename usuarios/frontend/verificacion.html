<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación 2FA - BENDICIÓN</title>
    <style>
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
            --danger: #e63946;
            --ok: #52c41a;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 840px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--bg-box);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(240,185,11,0.12);
            margin-bottom: 16px;
        }

        h1, h2 {
            margin-top: 0;
            color: var(--primary);
        }

        p {
            color: var(--text-muted);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 720px) {
            .row { grid-template-columns: 1fr; }
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #10141a;
            color: var(--text);
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: #fff; }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.ok { background: rgba(82,196,26,0.2); color: #8ff18f; border: 1px solid #2c8f2c; }
        .badge.off { background: rgba(230,57,70,0.2); color: #ff9ca4; border: 1px solid #b02a35; }

        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: none;
        }

        .alert.error {
            background: rgba(230,57,70,0.2);
            color: #ff9ca4;
            border: 1px solid #b02a35;
        }

        .alert.success {
            background: rgba(82,196,26,0.2);
            color: #8ff18f;
            border: 1px solid #2c8f2c;
        }

        .secret-box {
            font-family: monospace;
            background: #10141a;
            border: 1px dashed var(--border);
            border-radius: 6px;
            padding: 10px;
            word-break: break-all;
        }

        img.qr {
            max-width: 220px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #fff;
            padding: 8px;
        }
    </style>
    <script src="/CriptoBendicion/seguridad/guard.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Verificación 2FA</h1>
        <div id="alertBox" class="alert"></div>
        <p>
            Estado actual: <span id="statusBadge" class="badge off">Desactivado</span>
        </p>
        <button class="btn-primary" id="btnReload">Actualizar estado</button>
        <button class="btn-primary" id="btnBack">Volver a Home</button>
    </div>

    <div class="card" id="setupCard">
        <h2>1) Configurar Google Authenticator</h2>
        <p>Genera el secreto, escanea el QR en Google Authenticator y confirma con un código.</p>

        <button class="btn-primary" id="btnGenerate">Generar configuración 2FA</button>

        <div id="setupData" style="display:none; margin-top:14px;">
            <p>Clave manual:</p>
            <div id="secretText" class="secret-box"></div>
            <p style="margin-top:12px;">QR:</p>
            <img id="qrImage" class="qr" alt="QR 2FA">

            <div class="row" style="margin-top:12px;">
                <div>
                    <label for="codeEnable">Código de 6 dígitos</label>
                    <input id="codeEnable" placeholder="Ej: 123456" inputmode="numeric" autocomplete="one-time-code">
                </div>
            </div>
            <button class="btn-primary" id="btnEnable" style="margin-top:10px;">Activar 2FA</button>
        </div>
    </div>

    <div class="card" id="disableCard" style="display:none;">
        <h2>2) Desactivar 2FA</h2>
        <p>Para desactivar, ingresa un código válido de Google Authenticator.</p>
        <div class="row">
            <div>
                <label for="codeDisable">Código de 6 dígitos</label>
                <input id="codeDisable" placeholder="Ej: 123456" inputmode="numeric" autocomplete="one-time-code">
            </div>
        </div>
        <button class="btn-danger" id="btnDisable" style="margin-top:10px;">Desactivar 2FA</button>
    </div>
</div>

<script>
(function () {
    const API = "/CriptoBendicion/seguridad_api";
    const alertBox = document.getElementById("alertBox");
    const statusBadge = document.getElementById("statusBadge");
    const setupCard = document.getElementById("setupCard");
    const disableCard = document.getElementById("disableCard");
    const setupData = document.getElementById("setupData");

    function showAlert(msg, type) {
        alertBox.textContent = msg;
        alertBox.className = "alert " + (type || "error");
        alertBox.style.display = "block";
    }

    function clearAlert() {
        alertBox.style.display = "none";
        alertBox.textContent = "";
    }

    async function authedFetch(path, options) {
        const res = await fetch(API + path, Object.assign({
            credentials: "include",
            headers: { "Content-Type": "application/json" }
        }, options || {}));
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            throw new Error(data.error || "Error del servidor");
        }
        return data;
    }

    async function loadStatus() {
        clearAlert();
        const status = await authedFetch("/2fa/status", { method: "GET" });
        if (status.enabled) {
            statusBadge.textContent = "Activado";
            statusBadge.className = "badge ok";
            setupCard.style.display = "none";
            disableCard.style.display = "block";
        } else {
            statusBadge.textContent = "Desactivado";
            statusBadge.className = "badge off";
            setupCard.style.display = "block";
            disableCard.style.display = "none";
        }
    }

    async function generateSetup() {
        clearAlert();
        const data = await authedFetch("/2fa/setup", { method: "POST", body: "{}" });
        document.getElementById("secretText").textContent = data.secret;
        document.getElementById("qrImage").src =
            "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
            encodeURIComponent(data.otpauth_url);
        setupData.style.display = "block";
        showAlert("Configuración generada. Escanea el QR y activa con un código.", "success");
    }

    async function enable2FA() {
        clearAlert();
        const code = document.getElementById("codeEnable").value.trim();
        if (!code) {
            showAlert("Ingresa el código generado por Google Authenticator.");
            return;
        }
        await authedFetch("/2fa/enable", {
            method: "POST",
            body: JSON.stringify({ code: code })
        });
        document.getElementById("codeEnable").value = "";
        setupData.style.display = "none";
        showAlert("2FA activado correctamente.", "success");
        await loadStatus();
    }

    async function disable2FA() {
        clearAlert();
        const code = document.getElementById("codeDisable").value.trim();
        if (!code) {
            showAlert("Ingresa un código válido para desactivar 2FA.");
            return;
        }
        await authedFetch("/2fa/disable", {
            method: "POST",
            body: JSON.stringify({ code: code })
        });
        document.getElementById("codeDisable").value = "";
        showAlert("2FA desactivado.", "success");
        await loadStatus();
    }

    document.getElementById("btnBack").onclick = function () {
        window.location.href = "/CriptoBendicion/home";
    };
    document.getElementById("btnReload").onclick = function () {
        loadStatus().catch((e) => showAlert(e.message || "No se pudo actualizar estado"));
    };
    document.getElementById("btnGenerate").onclick = function () {
        generateSetup().catch((e) => showAlert(e.message || "No se pudo generar configuración"));
    };
    document.getElementById("btnEnable").onclick = function () {
        enable2FA().catch((e) => showAlert(e.message || "No se pudo activar 2FA"));
    };
    document.getElementById("btnDisable").onclick = function () {
        disable2FA().catch((e) => showAlert(e.message || "No se pudo desactivar 2FA"));
    };

    window.SEGURIDAD_GUARD.requireLoginAsync().then(function (userId) {
        if (!userId) return;
        loadStatus().catch((e) => showAlert(e.message || "No se pudo cargar estado 2FA"));
    });
})();
</script>
</body>
</html>
