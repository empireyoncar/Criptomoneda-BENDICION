<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Staking - Bendición</title>

    <style>
        body {
            background: #0b0e11;
            color: #eaecef;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #181a20;
            padding: 30px;
            border-radius: 14px;
            width: 380px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #f0b90b;
        }

        .wallet-box {
            background: #0e1117;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f0b90b;
        }

        .wallet-line {
            font-size: 14px;
            margin: 4px 0;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #2b3139;
            background: #0e1117;
            color: #eaecef;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f0b90b;
        }

        #rewardBox {
            margin-top: 12px;
            padding: 12px;
            background: #0e1117;
            border-left: 4px solid #f0b90b;
            border-radius: 6px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #f0b90b;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover {
            background: #d9a20a;
        }

        button:disabled {
            background: #8a7a3a;
            cursor: not-allowed;
        }

        #toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 20px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
            animation: fadeIn 0.3s ease;
        }

        .toast-ok {
            background: #1f4b2c;
            color: #a6f3c0;
        }

        .toast-err {
            background: #4b1f1f;
            color: #f3a6a6;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Staking Bendición</h2>

    <!-- STAKING GLOBAL -->
    <div class="wallet-box">
        <div class="wallet-line">
            <b>Staking Global:</b> <span id="globalStake">Cargando...</span>
        </div>

        <div style="background:#0e1117; border-radius:6px; height:10px; margin-top:5px;">
            <div id="stakeProgress" style="height:10px; width:0%; background:#f0b90b; border-radius:6px;"></div>
        </div>
    </div>

    <!-- WALLET -->
    <div class="wallet-box">
        <div class="wallet-line"><b>Wallet:</b> <span id="walletAddress"></span></div>
        <div class="wallet-line"><b>Saldo:</b> <span id="walletBalance"></span> BEND</div>
    </div>

    <label>Monto a stakear</label>
    <input type="number" id="amount" placeholder="Ej: 100">

    <label>Tiempo</label>
    <select id="days">
        <option value="30" data-don="6.6">30 días — Recompensa: 6.6 DON</option>
        <option value="60" data-don="15">60 días — Recompensa: 15 DON</option>
        <option value="90" data-don="25">90 días — Recompensa: 25 DON</option>
        <option value="180" data-don="55">180 días — Recompensa: 55 DON</option>
        <option value="365" data-don="120">365 días — Recompensa: 120 DON</option>
    </select>

    <div id="rewardBox">
        <p id="rewardText"></p>
    </div>

    <button id="btnStake">Iniciar Staking</button>

    <section class="card">
        <h2>Navegación</h2>
        <p>ir panel principal</p>
        <button id="btnGohome" class="btn btn-primary">Volver a Home</button>
    </section>

</div>

<div id="toast"></div>

<script>
const API = "https://empireyoncar.duckdns.org/Staking/stake";

const amountInput = document.getElementById("amount");
const daysSelect = document.getElementById("days");
const rewardBox = document.getElementById("rewardBox");
const rewardText = document.getElementById("rewardText");
const btn = document.getElementById("btnStake");
const toast = document.getElementById("toast");

const walletAddressEl = document.getElementById("walletAddress");
const walletBalanceEl = document.getElementById("walletBalance");

/* -------------------------
   TOAST
-------------------------- */
function showToast(msg, type="ok") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = type === "ok" ? "toast-ok" : "toast-err";
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
}

/* -------------------------
   CARGAR STAKING GLOBAL
-------------------------- */
async function loadGlobalStake() {
    try {
        const res = await fetch("https://empireyoncar.duckdns.org/Staking/total");
        const data = await res.json();

        const total = parseFloat(data.total_staked);
        const max = 10000;

        document.getElementById("globalStake").innerText =
            `${total} / ${max} BEND stakeadas`;

        const percent = Math.min((total / max) * 100, 100);
        document.getElementById("stakeProgress").style.width = percent + "%";

        if (total >= max) {
            btn.disabled = true;
            btn.innerText = "Límite alcanzado";
        }

    } catch (e) {
        document.getElementById("globalStake").innerText = "Error al cargar";
    }
}

loadGlobalStake();

/* -------------------------
   CARGAR WALLET + SALDO
-------------------------- */
async function loadWalletInfo() {
    const user_id = localStorage.getItem("user_id");
    if (!user_id) return;

    try {
        const resWallet = await fetch(`https://empireyoncar.duckdns.org/user_wallet/${user_id}`);
        const dataWallet = await resWallet.json();

        if (!dataWallet.wallet) return;

        const address = dataWallet.wallet.address;
        walletAddressEl.innerText = address;

        const resBalance = await fetch(`https://empireyoncar.duckdns.org/wallet_info/${address}`);
        const dataBalance = await resBalance.json();

        walletBalanceEl.innerText = parseFloat(dataBalance.balance).toFixed(2);

    } catch (e) {
        walletAddressEl.innerText = "Error";
        walletBalanceEl.innerText = "0.00";
    }
}

loadWalletInfo();

/* -------------------------
   CÁLCULO DE RECOMPENSA
-------------------------- */
function calcReward() {
    const amount = parseFloat(amountInput.value);
    const days = parseInt(daysSelect.value);
    const donReward = parseFloat(daysSelect.selectedOptions[0].dataset.don);

    if (!amount || amount <= 0) {
        rewardBox.style.display = "none";
        return;
    }

    const reward = (amount / 1000) * donReward;

    rewardText.innerHTML = `
        <b>Recompensa estimada:</b> ${reward.toFixed(4)} DON<br>
        <small>Duración: ${days} días — Recompensa base: ${donReward} DON por cada 1000 BEND</small>
    `;

    rewardBox.style.display = "block";
}

amountInput.oninput = calcReward;
daysSelect.onchange = calcReward;

/* -------------------------
   ENVIAR STAKE
-------------------------- */
btn.onclick = async () => {
    const amount = parseFloat(amountInput.value);
    const days = daysSelect.value;

    if (!amount || amount <= 0) {
        showToast("Ingresa un monto válido", "err");
        return;
    }

    const resLimit = await fetch("https://empireyoncar.duckdns.org/Staking/total");
    const dataLimit = await resLimit.json();
    const totalActual = parseFloat(dataLimit.total_staked);

    if (totalActual + amount > 10000) {
        showToast("Límite global de 10.000 BENDICIÓN alcanzado", "err");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Procesando...";

    try {
        const res = await fetch("https://empireyoncar.duckdns.org/Staking/stake", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_id: localStorage.getItem("user_id"),
                amount,
                days
            })
        });

        const data = await res.json();

        if (data.error) {
            showToast(data.error, "err");
        } else {
            showToast("Staking creado correctamente", "ok");
            loadWalletInfo();
            loadGlobalStake();
        }

    } catch (e) {
        showToast("Error de conexión con el servidor", "err");
    }

    btn.disabled = false;
    btn.innerText = "Iniciar Staking";
};

/* -------------------------
   NAVEGACIÓN
-------------------------- */
document.getElementById("btnGohome").onclick = () => {
    window.location.href = "/CriptoBendicion/home";
};

</script>

</body>
</html>
