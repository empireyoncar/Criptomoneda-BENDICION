<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mercado P2P - BENDICION (BEN)</title>
  <style>
    :root { --green:#0f9d58; --red:#d64b4b; --yellow:#f0b90b; --panel:#181a20; --line:#2b3139; --bg:#0b0e11; }
    body { font-family: Arial, sans-serif; background:#0b0e11; color:#eaecef; margin:0; }
    .layout { max-width:1240px; margin:0 auto; padding:20px; }
    .card { background:#181a20; border-radius:12px; padding:16px; margin-bottom:14px; }
    h1 { margin:0 0 8px 0; color:#f0b90b; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #2b3139; padding:10px; text-align:left; }
    th { color:#8b8d90; }
    input, select, textarea { width:100%; background:#0f1115; color:#eaecef; border:1px solid #2b3139; border-radius:6px; padding:8px; }
    button { background:#f0b90b; border:none; border-radius:6px; padding:10px 14px; font-weight:bold; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .muted { color:#8b8d90; font-size:13px; }
    .topbar { display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .topbarLinks { display:flex; gap:10px; align-items:center; }
    .market-link { color:var(--yellow); text-decoration:none; font-size:13px; }
    .home-btn { display:inline-block; background:#2b3139; color:#eaecef; text-decoration:none; border-radius:6px; padding:8px 12px; font-size:13px; font-weight:bold; }
    .online-orders-btn { border-radius:6px; padding:8px 12px; font-size:13px; font-weight:bold; border:none; text-decoration:none; color:#fff; background:#4b5563; }
    .online-orders-btn.red { background:#9d2f2f; }
    .online-orders-btn.white { background:#f3f4f6; color:#111827; }
    .online-orders-btn.gray { background:#4b5563; }
    .userCell a { color:#eaecef; text-decoration:none; font-weight:bold; }
    .userMeta { display:block; color:#8b8d90; font-size:11px; margin-top:4px; }
    .side-buy { color:var(--green); font-weight:bold; }
    .side-sell { color:var(--red); font-weight:bold; }
    .action-buy { background:var(--green); color:#fff; }
    .action-sell { background:var(--red); color:#fff; }
    .amountSmall { font-size:12px; color:#b3bcc7; }
    .limitBox { font-size:12px; color:#b3bcc7; margin-top:4px; }
    .ratingBadge { display:inline-block; margin-top:6px; color:#f4d35e; font-size:12px; }
    .termsSmall { display:block; color:#9aa4af; font-size:11px; margin-top:6px; line-height:1.35; }
    .chainStatus { margin-top:8px; font-size:13px; }
    .chainStatus.ok { color:#16a34a; }
    .chainStatus.down { color:#d64b4b; }
    .chainStatus.checking { color:#f0b90b; }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">
    <div class="topbar">
      <div>
        <h1>Mercado P2P - BENDICION (BEN)</h1>
        <div class="muted">Usuario: <span id="userId">-</span></div>
        <div id="blockchainStatus" class="chainStatus checking">Conexion a la blockchain: verificando...</div>
      </div>
      <div class="topbarLinks">
        <a class="home-btn" href="/CriptoBendicion/home">Ir a Home</a>
        <a id="btnOnlineOrders" class="online-orders-btn gray" href="/CriptoBendicion/p2p/orders-online">Ordenes online</a>
        <a class="market-link" id="myReputationLink" href="/CriptoBendicion/p2p/reputation">Ver reputacion</a>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Ofertas activas</h2>
    <div class="grid">
      <div>
        <label>Tipo de orden</label>
        <select id="fSide">
          <option value="">Todos</option>
          <option value="buy">Compra BEN</option>
          <option value="sell">Venta BEN</option>
        </select>
      </div>
      <div>
        <label>Criptomoneda</label>
        <input value="BENDICION (BEN)" disabled>
      </div>
      <div style="align-self:end;">
        <button id="btnReload">Actualizar</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Usuario</th>
          <th>Pais</th>
          <th>Tipo de orden</th>
          <th>Precio</th>
          <th>Disponible / Limite</th>
          <th>Metodo de pago</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="offersBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Mis ofertas creadas</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Tipo</th>
          <th>Disponible</th>
          <th>Estado</th>
          <th>Accion</th>
        </tr>
      </thead>
      <tbody id="myOffersBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Publicar oferta</h2>
    <div class="grid">
      <div><label>Tipo de orden</label><select id="side"><option value="buy">Compra BEN</option><option value="sell">Venta BEN</option></select></div>
      <div><label>Criptomoneda</label><input value="BENDICION (BEN)" disabled></div>
      <div><label>Pais</label><input id="country" placeholder="Ej: Espana"></div>
      <div><label>Fiat</label><input id="fiat" value="USD"></div>
      <div><label>Metodo de pago</label><input id="payment_method" placeholder="Ej: Bizum, transferencia"></div>
      <div><label>Banco / Proveedor</label><input id="payment_provider" placeholder="Ej: Santander o Bizum"></div>
      <div><label>Cuenta o Telefono</label><input id="account_reference" placeholder="IBAN o numero de telefono"></div>
      <div><label>Titular de la cuenta</label><input id="account_holder" placeholder="Nombre del titular"></div>
      <div><label>Precio</label><input id="price" type="number" step="0.0001"></div>
      <div><label>Cantidad</label><input id="amount_total" type="number" step="0.0001"></div>
      <div><label>Min limite</label><input id="min_limit" type="number" step="0.01" value="1"></div>
      <div><label>Max limite</label><input id="max_limit" type="number" step="0.01" value="800"></div>
      <div><label>Tiempo para completar</label><select id="completion_time_minutes"><option value="10">10 min</option><option value="15" selected>15 min</option><option value="30">30 min</option><option value="60">60 min</option></select></div>
      <div style="grid-column:1/-1;"><label>Terminos</label><textarea id="terms"></textarea></div>
    </div>
    <div style="margin-top:12px;"><button id="btnCreate">Crear oferta</button></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
  const userId = localStorage.getItem("user_id") || "usuario_demo";
  document.getElementById("userId").textContent = userId;
  document.getElementById("myReputationLink").href = `/CriptoBendicion/p2p/reputation?user_id=${encodeURIComponent(userId)}`;

  const API = "/CriptoBendicion/p2p_api";
  const API_BLOCKCHAIN = "/CriptoBendicion/blockchain";

  function sortDeep(value) {
    if (Array.isArray(value)) return value.map(sortDeep);
    if (value && typeof value === "object") {
      const ordered = {};
      Object.keys(value).sort().forEach((k) => { ordered[k] = sortDeep(value[k]); });
      return ordered;
    }
    return value;
  }

  function canonicalJson(obj) {
    return JSON.stringify(sortDeep(obj));
  }

  function toFixedHex(value, length) {
    return value.toString(16).padStart(length, "0");
  }

  function getPrivateKeyForSigning(address) {
    const cacheKey = `tx_private_key_${address}`;
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      return cached;
    }

    const entered = prompt("Introduce tu clave privada HEX para firmar la operacion P2P:");
    if (!entered) return null;
    const normalized = entered.trim().toLowerCase();
    if (!/^[0-9a-f]{64}$/.test(normalized)) {
      throw new Error("La clave privada debe tener 64 caracteres hex.");
    }
    sessionStorage.setItem(cacheKey, normalized);
    return normalized;
  }

  function derivePublicKeyAndAddress(privateKeyHex) {
    const ec = new elliptic.ec("secp256k1");
    const key = ec.keyFromPrivate(privateKeyHex, "hex");
    const pub = key.getPublic();
    const publicKeyHex =
      pub.getX().toString(16).padStart(64, "0") +
      pub.getY().toString(16).padStart(64, "0");
    const derivedAddress = CryptoJS.SHA256(publicKeyHex).toString();
    return { publicKeyHex, derivedAddress };
  }

  async function getWalletNonce(address) {
    const res = await fetch(`${API_BLOCKCHAIN}/wallet/${address}/nonce`);
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || "No se pudo obtener nonce de wallet");
    }
    return Number(data.nonce || 0);
  }

  function signTxPayload(privateKeyHex, payload) {
    const ec = new elliptic.ec("secp256k1");
    const key = ec.keyFromPrivate(privateKeyHex, "hex");
    const hashHex = CryptoJS.SHA256(canonicalJson(payload)).toString();
    const sig = key.sign(hashHex, "hex", { canonical: true });
    return toFixedHex(sig.r, 64) + toFixedHex(sig.s, 64);
  }

  async function buildSignedEscrowPayload(walletAddress, escrowAmount, metadata) {
    const privateKey = getPrivateKeyForSigning(walletAddress);
    if (!privateKey) {
      throw new Error("Operacion cancelada: firma requerida");
    }

    const { publicKeyHex, derivedAddress } = derivePublicKeyAndAddress(privateKey);
    if (derivedAddress !== walletAddress) {
      throw new Error("La clave privada no corresponde a la wallet activa.");
    }

    const nonce = await getWalletNonce(walletAddress);
    const txToSign = {
      amount: Number(escrowAmount),
      from: walletAddress,
      metadata: metadata || {},
      nonce,
      public_key: publicKeyHex,
      to: "P2P_ESCROW",
    };

    return {
      public_key: publicKeyHex,
      signature: signTxPayload(privateKey, txToSign),
      nonce,
      wallet_address: walletAddress,
    };
  }

  async function refreshOnlineOrdersButton() {
    const btn = document.getElementById("btnOnlineOrders");
    try {
      const res = await fetch(`${API}/orders/online/status?user_id=${encodeURIComponent(userId)}`);
      const data = await res.json();
      if (!res.ok) {
        btn.className = "online-orders-btn gray";
        btn.textContent = "Ordenes online";
        return;
      }

      const color = data.color || "gray";
      btn.className = `online-orders-btn ${color}`;
      btn.textContent = `Ordenes online (${data.count || 0})`;
    } catch (_error) {
      btn.className = "online-orders-btn gray";
      btn.textContent = "Ordenes online";
    }
  }

  async function checkBlockchainConnection() {
    const statusEl = document.getElementById("blockchainStatus");
    statusEl.className = "chainStatus checking";
    statusEl.textContent = "Conexion a la blockchain: verificando...";
    try {
      const res = await fetch(`${API}/health/blockchain`);
      const data = await res.json();
      const ok = Boolean(data && data.blockchain && data.blockchain.ok);
      if (res.ok && ok) {
        statusEl.className = "chainStatus ok";
        statusEl.textContent = "Conexion a la blockchain: OK";
      } else {
        const msg = data?.blockchain?.error || "sin respuesta";
        statusEl.className = "chainStatus down";
        statusEl.textContent = `Conexion a la blockchain: FALLA (${msg})`;
      }
    } catch (_error) {
      statusEl.className = "chainStatus down";
      statusEl.textContent = "Conexion a la blockchain: FALLA";
    }
  }

  function formatPrice(value) {
    return Number(value || 0).toFixed(3);
  }

  function formatAmount(value) {
    return Number(value || 0).toFixed(2);
  }

  function formatLimit(minLimit, maxLimit, fiatCurrency) {
    return `${formatPrice(minLimit)} - ${formatPrice(maxLimit)} ${fiatCurrency || "USD"}`;
  }

  function actionConfig(side) {
    return side === "sell"
      ? { label: "Comprar", className: "action-buy" }
      : { label: "Vender", className: "action-sell" };
  }

  async function loadOffers() {
    const side = document.getElementById("fSide").value;
    const url = new URL(API + "/offers", window.location.origin);
    if (side) url.searchParams.set("side", side);
    url.searchParams.set("asset", "BEN");

    const res = await fetch(url.toString());
    const data = await res.json();
    const tbody = document.getElementById("offersBody");
    tbody.innerHTML = "";

    (data.offers || []).forEach((o) => {
      const tipoOrden = o.side === "sell"
        ? '<span class="side-sell">Vender BEN</span>'
        : '<span class="side-buy">Comprar BEN</span>';
      const action = actionConfig(o.side);
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${o.id}</td>
        <td class="userCell">
          <a href="/CriptoBendicion/p2p/reputation?user_id=${encodeURIComponent(o.user_id)}">${o.user_id}</a>
          <span class="userMeta">${o.total_orders || 0} Ordenes | ${o.completion_rate || 0}% Completadas | ${o.completion_time_minutes || 15} min</span>
          <span class="ratingBadge">${Number(o.average_score || 0).toFixed(1)} ★</span>
        </td>
        <td>${o.country || "-"}</td>
        <td>${tipoOrden}</td>
        <td>${formatPrice(o.price)}</td>
        <td>
          <div class="amountSmall">${formatAmount(o.amount_available)} BEN</div>
          <div class="limitBox">${formatLimit(o.min_limit, o.max_limit, o.fiat_currency)}</div>
        </td>
        <td>
          ${o.payment_method}
          <span class="termsSmall">Terminos: ${o.terms ? o.terms : "Sin terminos especificos"}</span>
        </td>
        <td><button class="${action.className}" data-id="${o.id}">${action.label}</button></td>
      `;
      tr.querySelector("button").onclick = () => takeOffer(o);
      tbody.appendChild(tr);
    });
  }

  async function createOffer() {
    const walletAddress = localStorage.getItem("address") || "";
    if (!walletAddress) {
      alert("Debes tener wallet activa para publicar ofertas P2P.");
      return;
    }

    const payload = {
      user_id: userId,
      wallet_address: walletAddress,
      country: document.getElementById("country").value.trim(),
      side: document.getElementById("side").value,
      asset: "BEN",
      fiat_currency: document.getElementById("fiat").value.trim(),
      payment_method: document.getElementById("payment_method").value.trim(),
      payment_provider: document.getElementById("payment_provider").value.trim(),
      account_reference: document.getElementById("account_reference").value.trim(),
      account_holder: document.getElementById("account_holder").value.trim(),
      price: parseFloat(document.getElementById("price").value),
      amount_total: parseFloat(document.getElementById("amount_total").value),
      min_limit: parseFloat(document.getElementById("min_limit").value || "0"),
      max_limit: parseFloat(document.getElementById("max_limit").value || "0"),
      completion_time_minutes: parseInt(document.getElementById("completion_time_minutes").value, 10),
      terms: document.getElementById("terms").value.trim()
    };

    if (payload.side === "sell") {
      try {
        const signed = await buildSignedEscrowPayload(
          walletAddress,
          payload.amount_total,
          {
            source: "p2p_create_offer_sell",
            user_id: userId,
            amount: Number(payload.amount_total),
            asset: "BEN",
          }
        );
        payload.public_key = signed.public_key;
        payload.signature = signed.signature;
        payload.nonce = signed.nonce;
      } catch (err) {
        alert(err.message || err);
        return;
      }
    }

    const res = await fetch(API + "/offers", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "Error al crear oferta");
      return;
    }
    alert("Oferta creada: " + data.offer.id);
    await Promise.all([loadOffers(), loadMyOffers(), refreshOnlineOrdersButton()]);
  }

  async function takeOffer(offer) {
    const amountRaw = prompt("Cantidad a tomar:");
    if (!amountRaw) return;

    const offerId = offer.id;
    const payload = {offer_id: offerId, taker_user_id: userId, amount: parseFloat(amountRaw)};

    if (offer.side === "buy") {
      const walletAddress = localStorage.getItem("address") || "";
      if (!walletAddress) {
        alert("Debes tener wallet activa para vender en una oferta de compra.");
        return;
      }

      try {
        const signed = await buildSignedEscrowPayload(
          walletAddress,
          parseFloat(amountRaw),
          {
            source: "p2p_take_offer_buy",
            offer_id: offerId,
            taker_user_id: userId,
            amount: Number(parseFloat(amountRaw)),
            asset: "BEN",
          }
        );
        payload.seller_wallet = signed.wallet_address;
        payload.public_key = signed.public_key;
        payload.signature = signed.signature;
        payload.nonce = signed.nonce;
      } catch (err) {
        alert(err.message || err);
        return;
      }
    }

    const res = await fetch(API + "/orders/take", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "No se pudo tomar oferta");
      return;
    }
    alert("Orden creada: " + data.order.id);
    window.location.href = "/CriptoBendicion/p2p/order/" + data.order.id;
  }

  async function loadMyOffers() {
    const res = await fetch(`${API}/orders/online?user_id=${encodeURIComponent(userId)}&role=seller&limit=50`);
    const data = await res.json();
    if (!res.ok) return;

    const body = document.getElementById("myOffersBody");
    body.innerHTML = "";

    const offers = (data.offers || []).filter((o) => o.status === "active").slice(0, 10);
    offers.forEach((o) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${o.id}</td>
        <td>${o.side === "sell" ? "Vender" : "Comprar"}</td>
        <td>${formatAmount(o.amount_available)} BEN</td>
        <td>${o.status}</td>
        <td><button class="${o.side === "sell" ? "btn-primary" : "btn-secondary"}" data-cancel="${o.id}">Cancelar</button></td>
      `;
      body.appendChild(tr);
    });

    if (!offers.length) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="5" class="muted">No tienes ofertas activas.</td>`;
      body.appendChild(tr);
    }

    body.querySelectorAll("[data-cancel]").forEach((btn) => {
      btn.onclick = async () => {
        try {
          const offerId = btn.getAttribute("data-cancel");
          const res = await fetch(API + `/offers/${offerId}/cancel`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({user_id: userId})
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Error");
          alert("Oferta cancelada.");
          await loadMyOffers();
        } catch (e) { alert(e.message); }
      };
    });
  }

  document.getElementById("btnReload").onclick = loadOffers;
  document.getElementById("btnCreate").onclick = createOffer;
  checkBlockchainConnection();
  refreshOnlineOrdersButton();
  loadMyOffers();
  window.setInterval(checkBlockchainConnection, 30000);
  window.setInterval(loadOffers, 8000);
  window.setInterval(refreshOnlineOrdersButton, 12000);
  window.setInterval(loadMyOffers, 15000);
  loadOffers();
</script>
</body>
</html>
