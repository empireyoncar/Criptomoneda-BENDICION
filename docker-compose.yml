version: "3.9"

services:

  usuarios:
    build: ./usuarios/backend
    container_name: bendicion_usuarios
    command: python login_server.py
    ports:
      - "5001:5001"
    volumes:
      - ./database.json:/app/db/database.json
    restart: always
    networks:
      - bendicion_net

  backend:
    build: ./node/backend
    container_name: bendicion_backend
    command: python node.py
    ports:
      - "7777:7777"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallets.json:/app/db/wallets.json
    restart: always
    networks:
      - bendicion_net

  admin:
    build: ./admin/backend
    container_name: bendicion_admin
    command: python admin_server.py
    ports:
      - "8888:8888"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  web:
    build: ./web/backend
    container_name: bendicion_web
    command: python web_server.py
    ports:
      - "5000:5000"
    volumes:
      - ./templates_web:/app/templates_web
      - ./templates_ADMIN:/app/templates_ADMIN
      - ./templates_KYC:/app/templates_KYC
      - ./templates_staking:/app/templates_staking
      - ./static:/app/static
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
      - ./staking.json:/app/db/staking.json
      - ./staking_history.json:/app/db/staking_history.json
    restart: always
    networks:
      - bendicion_net

  staking:
    build: ./staking/backend
    container_name: staking_server
    command: python staking_server.py
    ports:
      - "6666:6666"
    volumes:
      - ./templates_staking:/app/templates_staking
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
      - ./staking.json:/app/db/staking.json
      - ./staking_history.json:/app/db/staking_history.json
    restart: always
    networks:
      - bendicion_net

networks:
  bendicion_net:
    driver: bridge
