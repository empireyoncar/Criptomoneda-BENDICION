version: "3.9"

services:
  backend:
    build: .
    container_name: bendicion_backend
    command: python node.py
    ports:
      - "7777:7777"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  admin:
    build: .
    container_name: bendicion_admin
    command: python admin_server.py
    ports:
      - "8888:8888"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  web:
    build: .
    container_name: bendicion_web
    command: python web_server.py
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  p2p:
    build: .
    container_name: bendicion_p2p
    command: python p2p_server.py
    ports:
      - "9999:9999"
    volumes:
      - ./p2p_data.json:/app/db/p2p_data.json
    restart: always
    networks:
      - bendicion_net

networks:
  bendicion_net:
    driver: bridge
