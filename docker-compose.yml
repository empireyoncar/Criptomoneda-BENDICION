version: "3.9"

services:
  backend:
    build: .
    container_name: bendicion_backend
    command: python node.py
    ports:
      - "7777:7777"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  admin:
    build: .
    container_name: bendicion_admin
    command: python admin_server.py
    ports:
      - "8888:8888"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  web:
    build: .
    container_name: bendicion_web
    command: python web_server.py
    ports:
      - "5000:5000"
    volumes:
      # Montamos todo el proyecto
      - ./:/app

      # JSON persistentes
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  staking:
    build: .
    container_name: staking_server
    command: python staking_server.py
    ports:
      - "6666:6666"
    volumes:
      # Acceso a los mismos JSON que usan los otros servicios
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
      - ./staking.json:/app/db/staking.json
    restart: always
    networks:
      - bendicion_net

networks:
  bendicion_net:
    driver: bridge
