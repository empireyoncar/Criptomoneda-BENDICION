<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Staking - Bendición</title>

    <style>
        body {
            background: #0b0e11;
            color: #eaecef;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #181a20;
            padding: 20px;
            border-bottom: 2px solid #f0b90b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            color: #f0b90b;
        }

        .wallet-info {
            text-align: right;
            font-size: 14px;
        }

        .container {
            padding: 25px;
        }

        .card {
            background: #181a20;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        h2 {
            margin-top: 0;
            color: #f0b90b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #2b3139;
            text-align: left;
        }

        th {
            color: #f0b90b;
        }

        .progress-bar {
            width: 100%;
            background: #2b3139;
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #f0b90b;
            width: 0%;
        }

        button {
            padding: 8px 12px;
            background: #f0b90b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #d9a20a;
        }

        .btn-cancel {
            background: #c0392b;
        }

        .btn-cancel:hover {
            background: #992d22;
        }

        #toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 20px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }

        .toast-ok {
            background: #1f4b2c;
            color: #a6f3c0;
        }

        .toast-err {
            background: #4b1f1f;
            color: #f3a6a6;
        }

        .new-stake-btn {
            background: #f0b90b;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 16px;
            display: inline-block;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .new-stake-btn:hover {
            background: #d9a20a;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Dashboard de Staking</h1>

    <div class="wallet-info">
        <div><b>Wallet:</b> <span id="walletAddress"></span></div>
        <div><b>Saldo:</b> <span id="walletBalance"></span> BEND</div>
        <div><b>Recompensas:</b> <span id="walletRewards"></span> DON</div>
    </div>
</div>

<div class="container">

    <a href="staking.html" class="new-stake-btn">+ Crear nuevo staking</a>

    <!-- STAKES ACTIVOS -->
    <div class="card">
        <h2>Stakes Activos</h2>
        <table id="activeStakesTable">
            <thead>
                <tr>
                    <th>Monto</th>
                    <th>APR</th>
                    <th>Progreso</th>
                    <th>Recompensa Acumulada</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- HISTORIAL -->
    <div class="card">
        <h2>Historial</h2>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Monto</th>
                    <th>APR</th>
                    <th>Recompensa Total</th>
                    <th>Estado</th>
                    <th>Fecha Final</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<div id="toast"></div>

<script>
/* -------------------------
   TOAST
-------------------------- */
function showToast(msg, type="ok") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = type === "ok" ? "toast-ok" : "toast-err";
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
}

/* -------------------------
   VALIDAR LOGIN + WALLET
-------------------------- */
async function validateUser() {
    const userId = localStorage.getItem("user_id");

    if (!userId) {
        alert("Debes iniciar sesión.");
        window.location.href = "login.html";
        return null;
    }

    try {
        const res = await fetch(`https://empireyoncar.duckdns.org/wallet/user/${userId}`);
        const data = await res.json();

        if (data.error) {
            alert("No tienes wallet asociada.");
            window.location.href = "wallet.html";
            return null;
        }

        document.getElementById("walletAddress").textContent = data.address;
        return { userId, address: data.address };

    } catch (err) {
        alert("Error al validar usuario.");
        return null;
    }
}

/* -------------------------
   CARGAR SALDO Y RECOMPENSAS
-------------------------- */
async function loadWalletInfo(address, userId) {
    const res1 = await fetch(`https://empireyoncar.duckdns.org/wallet/${address}`);
    const w = await res1.json();
    document.getElementById("walletBalance").textContent = parseFloat(w.balance).toFixed(2);

    const res2 = await fetch(`https://empireyoncar.duckdns.org/don/balance/${userId}`);
    const d = await res2.json();
    document.getElementById("walletRewards").textContent = parseFloat(d.balance).toFixed(4);
}

/* -------------------------
   CARGAR STAKES ACTIVOS
-------------------------- */
async function loadActiveStakes(userId) {
    const res = await fetch(`https://empireyoncar.duckdns.org/Staking/user/${userId}`);
    const data = await res.json();

    const tbody = document.querySelector("#activeStakesTable tbody");
    tbody.innerHTML = "";

    data.stakes.forEach(stake => {
        const start = new Date(stake.start_date);
        const end = new Date(stake.end_date);
        const now = new Date();

        const progress = Math.min(100, ((now - start) / (end - start)) * 100);

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${stake.amount}</td>
            <td>${stake.days} días</td>
            <td>
                <div class="progress-bar">
                    <div class="progress" style="width:${progress}%"></div>
                </div>
            </td>
            <td>${stake.reward_acumulada.toFixed(4)} DON</td>
            <td>
                <button class="btn-cancel" onclick="cancelStake('${stake.stake_id}')">Cancelar</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

/* -------------------------
   CARGAR HISTORIAL
-------------------------- */
async function loadHistory(userId) {
    const res = await fetch(`https://empireyoncar.duckdns.org/Staking/history/${userId}`);
    const data = await res.json();

    const tbody = document.querySelector("#historyTable tbody");
    tbody.innerHTML = "";

    data.history.forEach(h => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${h.amount}</td>
            <td>${h.days} días</td>
            <td>${h.total_reward.toFixed(4)} DON</td>
            <td>${h.status}</td>
            <td>${new Date(h.end_date).toLocaleDateString()}</td>
        `;
        tbody.appendChild(tr);
    });
}

/* -------------------------
   CANCELAR STAKE
-------------------------- */
async function cancelStake(stakeId) {
    const userId = localStorage.getItem("user_id");

    const res = await fetch(`https://empireyoncar.duckdns.org/Staking/cancel/${stakeId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId })
    });

    const data = await res.json();

    if (data.error) {
        showToast(data.error, "err");
    } else {
        showToast("Stake cancelado correctamente", "ok");
        initDashboard();
    }
}

/* -------------------------
   INICIALIZAR DASHBOARD
-------------------------- */
async function initDashboard() {
    const user = await validateUser();
    if (!user) return;

    await loadWalletInfo(user.address, user.userId);
    await loadActiveStakes(user.userId);
    await loadHistory(user.userId);
}

initDashboard();
</script>

</body>
</html>
