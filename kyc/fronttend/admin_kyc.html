<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin KYC</title>
  <style>
    body { background:#0b0e11; color:#eaecef; font-family:Arial, sans-serif; margin:0; padding:20px; }
    .wrap { max-width:1220px; margin:0 auto; display:grid; grid-template-columns:1.15fr 1fr; gap:14px; }
    .panel { background:#181a20; border-radius:12px; padding:16px; }
    h1,h2 { color:#f0b90b; margin:0 0 10px 0; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:8px; border-bottom:1px solid #2b3139; font-size:13px; }
    tr:hover { background:#222834; cursor:pointer; }
    .badge { padding:4px 8px; border-radius:6px; font-size:12px; font-weight:700; text-transform:capitalize; }
    .pending { background:#4b5563; }
    .in_review { background:#0ea5e9; }
    .approved { background:#15803d; }
    .rejected { background:#b91c1c; }
    .step { border:1px solid #2b3139; border-radius:8px; padding:10px; margin-bottom:10px; }
    .actions { display:flex; gap:8px; margin-top:10px; }
    .topbar { max-width:1220px; margin:0 auto 14px auto; display:flex; justify-content:space-between; align-items:center; }
    button { border:none; border-radius:8px; padding:9px 12px; font-weight:700; cursor:pointer; }
    .btn-ok { background:#16a34a; color:#fff; }
    .btn-no { background:#dc2626; color:#fff; }
    .btn-back { background:#2b3139; color:#eaecef; }
    .muted { color:#9aa4af; font-size:12px; }
    textarea { width:100%; min-height:90px; background:#0f1115; color:#eaecef; border:1px solid #2b3139; border-radius:8px; padding:8px; }
    a.file { color:#f0b90b; text-decoration:none; }
  </style>
  <script src="/CriptoBendicion/seguridad/guard.js"></script>
</head>
<body>
  <div class="topbar">
    <h1>Panel Admin KYC</h1>
    <button class="btn-back" onclick="goCentralAdmin()">Volver al Admin central</button>
  </div>
  <div class="wrap">
    <div class="panel">
      <h2>Solicitudes</h2>
      <table id="tb">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Pais</th>
            <th>Estado KYC</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="muted" style="margin-top:8px;">Acceso permitido solo desde IP interna 192.168.x.x.</div>
    </div>

    <div class="panel">
      <h2>Detalle solicitud</h2>
      <div id="meta" class="muted">Selecciona un usuario</div>
      <div id="detail"></div>
      <h2>Motivos de rechazo (uno por linea)</h2>
      <textarea id="reasons" placeholder="Documento borroso\nNombre no coincide\nComprobante vencido"></textarea>
      <div class="actions">
        <button class="btn-ok" onclick="decide('approved')">Aprobar solicitud</button>
        <button class="btn-no" onclick="decide('rejected')">Rechazar solicitud</button>
      </div>
    </div>
  </div>

<script>
  const API = "/CriptoBendicion/kyc_api";
  const adminId = window.SEGURIDAD_GUARD.requireAdmin({ allowedAdminIds: ["001", "jonatan salazar"] });
  let selectedUserId = "";

  function goCentralAdmin() {
    if (window.location.port === "5016") {
      window.location.href = `${window.location.protocol}//${window.location.hostname}:5011/CriptoBendicion/admin/`;
      return;
    }
    window.location.href = "/CriptoBendicion/admin/";
  }

  function badge(status) {
    return `<span class="badge ${status || 'pending'}">${status || 'pending'}</span>`;
  }

  function stepRow(title, key, step) {
    const file = step && step.file
      ? `<a class="file" target="_blank" href="${API}/docs/${encodeURIComponent(selectedUserId)}/${encodeURIComponent(step.file)}">${step.file}</a>`
      : "Sin archivo";
    return `
      <div class="step">
        <div><strong>${title}</strong></div>
        <div class="muted">Estado: ${badge(step?.status)}</div>
        <div class="muted">Archivo: ${file}</div>
      </div>
    `;
  }

  async function loadRequests() {
    const res = await fetch(`${API}/admin/requests`);
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "No se pudieron cargar solicitudes");
      return;
    }

    const tbody = document.querySelector("#tb tbody");
    tbody.innerHTML = "";

    (data.requests || []).forEach((u) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${u.id}</td>
        <td>${u.fullname || '-'}</td>
        <td>${u.email || '-'}</td>
        <td>${u.country || '-'}</td>
        <td>${badge(u.overall_status)}</td>
      `;
      tr.onclick = () => loadDetail(u.id);
      tbody.appendChild(tr);
    });
  }

  async function loadDetail(userId) {
    selectedUserId = userId;
    const res = await fetch(`${API}/admin/request/${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "No se pudo cargar detalle");
      return;
    }

    const r = data.request;
    document.getElementById("meta").textContent = `${r.user_id} | ${r.fullname || '-'} | ${r.email || '-'} | ${r.country || '-'} | ${r.overall_status}`;

    const detail = document.getElementById("detail");
    detail.innerHTML = "";
    detail.innerHTML += stepRow("Documento de identidad", "id_document", r.id_document);
    detail.innerHTML += stepRow("Comprobante de domicilio", "address_document", r.address_document);
    detail.innerHTML += stepRow("Selfie", "selfie", r.selfie);
    detail.innerHTML += `<div class="step"><strong>Verificacion telefono</strong><div class="muted">Estado: ${badge(r.phone_verification?.status)}</div></div>`;
  }

  async function decide(decision) {
    if (!selectedUserId) {
      alert("Selecciona primero un usuario");
      return;
    }

    const reasonsRaw = document.getElementById("reasons").value || "";
    const reasons = reasonsRaw.split("\n").map((x) => x.trim()).filter(Boolean);

    const res = await fetch(`${API}/admin/decision`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user_id: selectedUserId,
        decision,
        reasons,
        admin_id: adminId,
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "No se pudo aplicar decision");
      return;
    }

    alert(`Solicitud ${decision === 'approved' ? 'aprobada' : 'rechazada'} correctamente`);
    await loadDetail(selectedUserId);
    await loadRequests();
  }

  loadRequests();
  window.setInterval(loadRequests, 20000);
</script>
</body>
</html>
