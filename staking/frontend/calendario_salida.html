<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Calendario de Salida - Staking</title><style>:root{--bg:#0a0d10;--panel:rgba(19,24,30,.9);--text:#eef2f6;--muted:#95a1ad;--line:rgba(255,255,255,.08);--gold:#f0b90b}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;color:var(--text);background:linear-gradient(180deg,#0a0d10 0%,#10151b 100%)}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 40px}.nav,.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px}.nav{padding:16px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.nav a{color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:12px}.nav a.active{background:rgba(240,185,11,.14);color:var(--gold);font-weight:700}.panel{padding:22px}.timeline{display:grid;gap:14px;margin-top:14px}.item{display:grid;grid-template-columns:14px 1fr;gap:14px}.dot{width:14px;height:14px;border-radius:50%;margin-top:6px;background:var(--gold);box-shadow:0 0 0 6px rgba(240,185,11,.12)}.body{padding-bottom:14px;border-bottom:1px solid var(--line)}.title{font-size:18px;font-weight:800;margin-bottom:6px}.muted{color:var(--muted)}.empty{padding:22px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px;margin-top:14px}</style><script src="/CriptoBendicion/seguridad/guard.js"></script><script>window.SEGURIDAD_GUARD.requireLogin();</script></head><body><div class="shell"><nav class="nav"><a href="/CriptoBendicion/staking/dashboard">Dashboard</a><a href="/CriptoBendicion/staking/stake_activos">Stakes activos</a><a href="/CriptoBendicion/staking/historial">Historial</a><a href="/CriptoBendicion/staking/radar_rapido">Radar rapido</a><a class="active" href="/CriptoBendicion/staking/calendario_salida">Calendario salida</a></nav><section class="panel"><h1 style="margin:0 0 10px;color:var(--gold)">Calendario de salida</h1><p style="margin:0;color:var(--muted)">Orden cronologico de liberacion para planificar reinversiones o liquidez.</p><div id="timeline" class="timeline"></div></section></div><script>const API_STAKING="https://empireyoncar.duckdns.org/CriptoBendicion/staking_api";function uid(){return localStorage.getItem("user_id")}function n(v,d=0){return Number(v||0).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d})}function dt(v){return v?new Date(v).toLocaleString("es-ES"):"-"}function rem(ts){const r=Number(ts)-Math.floor(Date.now()/1000);if(r<=0)return"Listo para cerrar";const d=Math.floor(r/86400),h=Math.floor((r%86400)/3600),m=Math.floor((r%3600)/60);return d>0?`${d}d ${h}h restantes`:`${h}h ${m}m restantes`}async function j(url,msg){const res=await fetch(url);const raw=await res.text();let data={};if(raw){data=JSON.parse(raw)}if(!res.ok)throw new Error(data.error||msg);return data}async function init(){const userId=uid();if(!userId){location.href="/CriptoBendicion/login";return}const data=await j(`${API_STAKING}/Staking/user/${userId}`,"No se pudo cargar calendario de salida");const stakes=(data.stakes||[]).sort((a,b)=>a.end_timestamp-b.end_timestamp);const timeline=document.getElementById("timeline");if(!stakes.length){timeline.innerHTML='<div class="empty">No tienes stakes activos para ordenar por vencimiento.</div>';return}timeline.innerHTML=stakes.map((stake,idx)=>`<div class="item"><div class="dot"></div><div class="body"><div class="title">${idx+1}. ${n(stake.amount)} BEND · ${stake.days} dias</div><div class="muted" style="margin-bottom:8px;">Vence ${dt(stake.end_date)} · ${rem(stake.end_timestamp)}</div><div>DON total esperado: <strong>${n(stake.reward_total,4)}</strong></div><div class="muted" style="margin-top:6px;">Transfer TX: ${stake.transfer_tx_id||'-'}</div></div></div>`).join('')}init().catch(err=>{document.getElementById("timeline").innerHTML=`<div class="empty">${err.message||err}</div>`})</script></body></html>
