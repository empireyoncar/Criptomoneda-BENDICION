version: "3.9"

services:
  backend:
    build: .
    container_name: bendicion_backend
    command: python node.py
    ports:
      - "7777:7777"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallets.json:/app/db/wallets.json
    restart: always
    networks:
      - bendicion_net

  admin:
    build: .
    container_name: bendicion_admin
    command: python admin_server.py
    ports:
      - "8888:8888"
    volumes:
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  web:
    build: .
    container_name: bendicion_web
    command: python web_server.py
    ports:
      - "5000:5000"
    volumes:
      # Montar SOLO las carpetas de plantillas y estáticos desde tu PC
      - ./templates_web:/app/templates_web
      - ./templates_ADMIN:/app/templates_ADMIN
      - ./templates_KYC:/app/templates_KYC
      - ./static:/app/static

      # JSON persistentes
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
    restart: always
    networks:
      - bendicion_net

  staking:
    build: .
    container_name: staking_server
    command: python staking_server.py
    ports:
      - "6666:6666"
    volumes:
      # Montar SOLO las plantillas si las usa
      - ./templates_web:/app/templates_web

      # JSON persistentes
      - ./database.json:/app/db/database.json
      - ./wallet.json:/app/db/wallet.json
      - ./staking.json:/app/db/staking.json
    restart: always
    networks:
      - bendicion_net

networks:
  bendicion_net:
    driver: bridge
