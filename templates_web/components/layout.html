<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "BENDICIÓN" }}</title>

    <style>
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
        }

        body.light {
            --bg: #f4f4f4;
            --bg-box: white;
            --text: #222;
            --text-muted: #555;
            --primary: #d4a20a;
            --primary-hover: #b58900;
            --border: #ccc;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        #themeToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: var(--bg-box);
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            z-index: 30;
        }
    </style>
</head>

<body>

    {% include "components/header.html" %}

    <button id="themeToggle">Modo Claro</button>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% include "components/footer.html" %}

<script>
    const toggle = document.getElementById("themeToggle");

    toggle.onclick = () => {
        document.body.classList.toggle("light");
        toggle.textContent = document.body.classList.contains("light")
            ? "Modo Oscuro"
            : "Modo Claro";
    };
</script>

</body>
</html>
