<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro – BENDICIÓN</title>

  <style>
    :root {
      --bg: #0b0e11;
      --bg-box: #181a20;
      --text: #eaecef;
      --text-muted: #8b8d90;
      --primary: #f0b90b;
      --primary-hover: #c99700;
      --border: #2b3139;
      --error: #ff4d4f;
      --success: #52c41a;
    }

    body.light {
      --bg: #f4f4f4;
      --bg-box: white;
      --text: #222;
      --text-muted: #555;
      --primary: #d4a20a;
      --primary-hover: #b58900;
      --border: #ccc;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #particles {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at center, #1a1d23 0%, var(--bg) 100%);
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.7;
      animation: float 8s infinite linear;
    }

    @keyframes float {
      from { transform: translateY(0); opacity: 0.7; }
      to { transform: translateY(-800px); opacity: 0; }
    }

    .box {
      background: var(--bg-box);
      padding: 30px;
      border-radius: 12px;
      width: 380px;
      box-shadow: 0 0 20px rgba(240,185,11,0.15);
      animation: fadeIn 0.6s ease;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--primary);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px var(--primary); }
      to { text-shadow: 0 0 15px var(--primary); }
    }

    label {
      font-size: 14px;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 5px rgba(240,185,11,0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .alert {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .alert.error {
      background: rgba(255,77,79,0.2);
      color: var(--error);
      border: 1px solid var(--error);
    }

    .alert.success {
      background: rgba(82,196,26,0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .center {
      text-align: center;
      margin-top: 10px;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #themeToggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--primary);
      color: var(--bg-box);
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      z-index: 30;
    }
  </style>
</head>

<body>

<div id="particles"></div>

<button id="themeToggle">Modo Claro</button>

<div class="box">

  <h1>Registro – BENDICIÓN</h1>

  <div id="alertBox" class="alert"></div>

  <label>Nombre completo:</label>
  <input type="text" id="fullname">

  <label>Fecha de nacimiento:</label>
  <input type="date" id="birthdate">

  <label>País:</label>
  <input type="text" id="country">

  <label>Dirección completa:</label>
  <input type="text" id="address">

  <label>Teléfono (opcional):</label>
  <input type="text" id="phone" placeholder="Opcional">

  <label>Email:</label>
  <input type="email" id="email">

  <label>Contraseña (mínimo 20 caracteres):</label>
  <input type="password" id="password" minlength="20" placeholder="Mínimo 20 caracteres">

  <label>Confirmar contraseña:</label>
  <input type="password" id="password2" minlength="20" placeholder="Repite la contraseña">

  <button id="btnRegister">Registrarme</button>

  <p class="center">
    ¿Ya tienes cuenta?
    <a href="login">Inicia sesión</a>
  </p>

</div>

<script>
  /* Partículas */
  const particles = document.getElementById("particles");

  function createParticle() {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "%";
    p.style.top = "100%";
    p.style.animationDuration = 4 + Math.random() * 6 + "s";
    p.style.opacity = Math.random();
    particles.appendChild(p);
    setTimeout(() => p.remove(), 10000);
  }

  setInterval(createParticle, 150);

  /* Modo claro/oscuro */
  const toggle = document.getElementById("themeToggle");

  toggle.onclick = () => {
    document.body.classList.toggle("light");
    toggle.textContent = document.body.classList.contains("light")
      ? "Modo Oscuro"
      : "Modo Claro";
  };

  /* Registro */
  const IS_DIRECT_USUARIOS_WEB = window.location.port === "5000";
  const BASE_ORIGIN = `${window.location.protocol}//${window.location.hostname}`;
  const API = IS_DIRECT_USUARIOS_WEB
    ? `${BASE_ORIGIN}:5001`
    : "/CriptoBendicion/usuarios";

  const alertBox = document.getElementById("alertBox");

  function showAlert(msg, type="error") {
    alertBox.textContent = msg;
    alertBox.className = "alert " + type;
    alertBox.style.display = "block";
  }

  async function postJson(url, payload) {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const contentType = res.headers.get("content-type") || "";
    if (!contentType.includes("application/json")) {
      throw new Error("El servidor devolvió una respuesta inválida. Verifica nginx/usuarios_api.");
    }

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "No se pudo completar el registro");
    return data;
  }

  document.getElementById("btnRegister").onclick = async () => {
    const button = document.getElementById("btnRegister");
    button.disabled = true;
    button.textContent = "Registrando...";

    try {
      const fullname = document.getElementById("fullname").value.trim();
      const birthdate = document.getElementById("birthdate").value.trim();
      const country = document.getElementById("country").value.trim();
      const address = document.getElementById("address").value.trim();
      const phone = document.getElementById("phone").value.trim() || null;
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const password2 = document.getElementById("password2").value.trim();

      if (!fullname || !birthdate || !country || !address || !email || !password) {
        showAlert("Completa todos los campos obligatorios.");
        return;
      }

      if (password.length < 20) {
        showAlert("La contraseña debe tener mínimo 20 caracteres.");
        return;
      }

      if (password !== password2) {
        showAlert("Las contraseñas no coinciden.");
        return;
      }

      const data = await postJson(`${API}/register`, {
        fullname,
        birthdate,
        country,
        address,
        phone,
        email,
        password
      });

      if (data.user_id) {
        showAlert("Registro exitoso. Redirigiendo...", "success");
        setTimeout(() => {
          window.location.href = IS_DIRECT_USUARIOS_WEB ? "/login" : "/CriptoBendicion/login";
        }, 800);
      }
    } catch (error) {
      showAlert(error.message || "Error inesperado durante el registro.");
    } finally {
      button.disabled = false;
      button.textContent = "Registrarme";
    }
  };
</script>

</body>
</html>
