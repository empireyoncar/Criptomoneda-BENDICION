<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Administrador – BENDICIÓN</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Panel de Administración</h2>

    <form action="/admin_login" method="POST">
        <label>Email:</label>
        <input type="text" name="email" placeholder="admin@bendicion.com" required>

        <label>Contraseña:</label>
        <input type="password" name="password" placeholder="••••••" required>

        <button type="submit">Ingresar</button>
    </form>
</div>

</body>
</html>
