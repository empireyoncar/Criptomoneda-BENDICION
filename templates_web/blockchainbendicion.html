<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blockchain – BENDICIÓN</title>

    <style>
        :root {
            --bg: #0b0e11;
            --bg-box: #181a20;
            --text: #eaecef;
            --text-muted: #8b8d90;
            --primary: #f0b90b;
            --primary-hover: #c99700;
            --border: #2b3139;
            --error: #ff4d4f;
            --success: #52c41a;
        }

        body.light {
            --bg: #f4f4f4;
            --bg-box: white;
            --text: #222;
            --text-muted: #555;
            --primary: #d4a20a;
            --primary-hover: #b58900;
            --border: #ccc;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1d23 0%, var(--bg) 100%);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.7;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(0); opacity: 0.7; }
            to { transform: translateY(-800px); opacity: 0; }
        }

        #themeToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: var(--bg-box);
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            z-index: 30;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
        }

        .header-box {
            background: var(--bg-box);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(240,185,11,0.15);
        }

        .header-box h1 {
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .header-box p {
            margin: 4px 0;
            color: var(--text-muted);
        }

        .card {
            background: var(--bg-box);
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            margin-bottom: 16px;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #2b3139;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #3a414c;
        }

        pre {
            background: #111318;
            padding: 10px;
            border-radius: 8px;
            max-height: 500px;
            overflow: auto;
            font-size: 12px;
        }

        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: rgba(255,77,79,0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .alert.success {
            background: rgba(82,196,26,0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }
    </style>
</head>

<body>

<div id="particles"></div>
<button id="themeToggle">Modo Claro</button>

<div class="wrapper">

    <div class="header-box">
        <h1>Blockchain BENDICIÓN</h1>
        <p>Explora la cadena completa de bloques generados en el sistema.</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <section class="card">
        <h2>Ver Blockchain</h2>
        <button id="btnChain" class="btn btn-primary">Cargar Blockchain</button>
        <pre id="chain"></pre>
    </section>

    <section class="card">
        <h2>Navegación</h2>
        <button id="btnGoWallet" class="btn btn-secondary">Volver a Wallet</button>
        <button id="btnGoEnvio" class="btn btn-secondary">Ir a Operaciones</button>
    </section>

</div>

<script>
    // Partículas
    const particles = document.getElementById("particles");
    function createParticle() {
        const p = document.createElement("div");
        p.classList.add("particle");
        p.style.left = Math.random() * 100 + "%";
        p.style.top = "100%";
        p.style.animationDuration = 4 + Math.random() * 6 + "s";
        p.style.opacity = Math.random();
        particles.appendChild(p);
        setTimeout(() => p.remove(), 10000);
    }
    setInterval(createParticle, 150);

    // Modo claro/oscuro
    const toggle = document.getElementById("themeToggle");
    toggle.onclick = () => {
        document.body.classList.toggle("light");
        toggle.textContent = document.body.classList.contains("light")
            ? "Modo Oscuro"
            : "Modo Claro";
    };

    const API = "http://localhost:7777";

    const alertBox = document.getElementById("alertBox");
    function showAlert(msg, type="error") {
        alertBox.textContent = msg;
        alertBox.className = "alert " + type;
        alertBox.style.display = "block";
    }

    // Seguridad: exigir login
    let userId = localStorage.getItem("user_id");
    if (!userId) {
        alert("Debes iniciar sesión primero.");
        window.location.href = "login.html";
    }

    // Ver blockchain
    document.getElementById("btnChain").onclick = async () => {
        try {
            const res = await fetch(`${API}/chain`);
            const data = await res.json();
            document.getElementById("chain").textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            console.error(err);
            showAlert("Error al obtener la blockchain.", "error");
        }
    };

    // Navegación
    document.getElementById("btnGoWallet").onclick = () => {
        window.location.href = "wallet.html";
    };

    document.getElementById("btnGoEnvio").onclick = () => {
        window.location.href = "envio.html";
    };
</script>

</body>
</html>
