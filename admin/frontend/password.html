<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Password - BENDICIÓN</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0e11; color: #eaecef; margin: 0; }
    header { background: #181a20; color: #f0b90b; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
    .container { max-width: 820px; margin: 24px auto; padding: 0 20px; }
    .box { background: #181a20; border-radius: 10px; padding: 22px; box-shadow: 0 0 12px rgba(240,185,11,0.08); }
    label { display: block; margin: 14px 0 6px; color: #f0b90b; }
    input { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 6px; border: 1px solid #2b3139; background: #0b0e11; color: #eaecef; }
    button { background: #f0b90b; color: #181a20; border: none; padding: 12px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-right: 10px; margin-top: 16px; }
    button:hover { background: #c99700; }
    .muted { color: #9aa4af; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .message { margin-top: 16px; padding: 12px; border-radius: 6px; display: none; }
    .message.ok { background: rgba(82,196,26,0.15); color: #8ee28e; border: 1px solid #2f8f2f; }
    .message.error { background: rgba(255,77,79,0.15); color: #ff8a8d; border: 1px solid #a73b3d; }
  </style>
</head>
<body>
<header>Cambio de Contraseña de Usuarios</header>
<div class="container">
  <div class="box">
    <p class="muted">Página exclusiva de administrador. La nueva contraseña debe tener al menos 20 caracteres.</p>

    <label for="userId">ID del usuario</label>
    <input id="userId" placeholder="UUID del usuario">

    <button id="btnLoad">Buscar usuario</button>
    <button id="btnBack" type="button">Volver al panel</button>

    <div id="userInfo" class="muted" style="margin-top:14px;"></div>

    <div class="row">
      <div>
        <label for="password">Nueva contraseña</label>
        <input id="password" type="password" placeholder="Mínimo 20 caracteres">
      </div>
      <div>
        <label for="password2">Confirmar contraseña</label>
        <input id="password2" type="password" placeholder="Repite la contraseña">
      </div>
    </div>

    <button id="btnSave">Actualizar contraseña</button>
    <div id="message" class="message"></div>
  </div>
</div>

<script>
  const IS_DIRECT_ADMIN_WEB = window.location.port === "5011";
  const BASE_ORIGIN = `${window.location.protocol}//${window.location.hostname}`;
  const API = IS_DIRECT_ADMIN_WEB
    ? `${BASE_ORIGIN}:5010/CriptoBendicion/admin_api`
    : "/CriptoBendicion/admin_api";
  const messageBox = document.getElementById("message");

  async function apiJson(url, options) {
    const res = await fetch(url, Object.assign({ credentials: "include" }, options || {}));
    const contentType = res.headers.get("content-type") || "";
    if (!contentType.includes("application/json")) {
      throw new Error("Tu sesión de admin expiró. Inicia sesión nuevamente.");
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error en API");
    return data;
  }

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = `message ${type}`;
    messageBox.style.display = "block";
  }

  async function loadUser() {
    const userId = document.getElementById("userId").value.trim();
    if (!userId) {
      showMessage("Debes indicar el ID del usuario.", "error");
      return;
    }

    const data = await apiJson(`${API}/users/${encodeURIComponent(userId)}`);

    document.getElementById("userInfo").textContent = `${data.fullname} | ${data.email} | rol: ${data.role}`;
    showMessage("Usuario cargado correctamente.", "ok");
  }

  async function updatePassword() {
    const userId = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value;
    const password2 = document.getElementById("password2").value;

    if (!userId || !password || !password2) {
      showMessage("Completa todos los campos.", "error");
      return;
    }

    if (password.length < 20) {
      showMessage("La contraseña debe tener al menos 20 caracteres.", "error");
      return;
    }

    if (password !== password2) {
      showMessage("Las contraseñas no coinciden.", "error");
      return;
    }

    await apiJson(`${API}/users/${encodeURIComponent(userId)}/password`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    });

    document.getElementById("password").value = "";
    document.getElementById("password2").value = "";
    showMessage("Contraseña actualizada correctamente.", "ok");
  }

  document.getElementById("btnLoad").onclick = () => loadUser().catch((error) => showMessage(error.message, "error"));
  document.getElementById("btnSave").onclick = () => updatePassword().catch((error) => showMessage(error.message, "error"));
  document.getElementById("btnBack").onclick = () => { window.location.href = "/CriptoBendicion/admin/"; };
</script>
</body>
</html>
