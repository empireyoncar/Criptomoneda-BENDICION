<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Historial de Staking</title><style>:root{--bg:#0a0d10;--panel:rgba(19,24,30,.9);--text:#eef2f6;--muted:#95a1ad;--line:rgba(255,255,255,.08);--gold:#f0b90b;--red:#ff6b6b}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;color:var(--text);background:linear-gradient(180deg,#0a0d10 0%,#10151b 100%)}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 40px}.nav,.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px}.nav{padding:16px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.nav a{color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:12px}.nav a.active{background:rgba(240,185,11,.14);color:var(--gold);font-weight:700}.panel{padding:22px}h1{margin:0 0 10px;color:var(--gold)}p{margin:0;color:var(--muted);line-height:1.6}table{width:100%;border-collapse:collapse;margin-top:14px}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.06em}.pill{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}.pill.finished{background:rgba(240,185,11,.14);color:var(--gold)}.pill.cancelled{background:rgba(255,107,107,.14);color:var(--red)}.empty{padding:22px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px;margin-top:14px}</style><script src="/CriptoBendicion/seguridad/guard.js"></script><script>window.SEGURIDAD_GUARD.requireLogin();</script></head><body><div class="shell"><nav class="nav"><a href="/CriptoBendicion/staking/dashboard">Dashboard</a><a href="/CriptoBendicion/staking/stake_activos">Stakes activos</a><a class="active" href="/CriptoBendicion/staking/historial">Historial</a><a href="/CriptoBendicion/staking/radar_rapido">Radar rapido</a><a href="/CriptoBendicion/staking/calendario_salida">Calendario salida</a></nav><section class="panel"><h1>Historial de staking</h1><p>Consulta tus stakes cerrados o cancelados con su recompensa total y fecha de cierre.</p><div id="wrap"></div></section></div><script>const API_STAKING="https://empireyoncar.duckdns.org/CriptoBendicion/staking_api";function uid(){return localStorage.getItem("user_id")}function n(v,d=0){return Number(v||0).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d})}function dt(v){return v?new Date(v).toLocaleString("es-ES"):"-"}async function j(url,msg){const res=await fetch(url);const raw=await res.text();let data={};if(raw){data=JSON.parse(raw)}if(!res.ok)throw new Error(data.error||msg);return data}async function init(){const userId=uid();if(!userId){location.href="/CriptoBendicion/login";return}const data=await j(`${API_STAKING}/Staking/history/${userId}`,"No se pudo cargar historial");const history=data.history||[];const wrap=document.getElementById("wrap");if(!history.length){wrap.innerHTML='<div class="empty">Aun no hay historial para mostrar.</div>';return}wrap.innerHTML=`<table><thead><tr><th>Monto</th><th>Plazo</th><th>DON total</th><th>Estado</th><th>Cierre</th><th>Transfer TX</th></tr></thead><tbody>${history.map(item=>`<tr><td>${n(item.amount)} BEND</td><td>${item.days} dias</td><td>${n(item.total_reward,4)} DON</td><td><span class="pill ${item.status==='finished'?'finished':'cancelled'}">${item.status}</span></td><td>${dt(item.final_date||item.end_date)}</td><td>${item.transfer_tx_id||'-'}</td></tr>`).join('')}</tbody></table>`}init().catch(err=>{document.getElementById("wrap").innerHTML=`<div class="empty">${err.message||err}</div>`})</script></body></html>
