name: criptobendicion

services:

  # ============================================================
  # BACKEND DE USUARIOS (API)
  # Puerto: 5001
  # Maneja login, registro, validación, base de datos de usuarios
  # ============================================================
  usuarios_api:
    build: ./usuarios/backend
    command: python login_server.py
    ports:
      - "5001:5001"
    volumes:
      - ./usuarios/backend/database.json:/app/database.json
    restart: always
    networks:
      - bendicion_net


  # ============================================================
  # FRONTEND DE USUARIOS (WEB)
  # Puerto: 5000
  # Sirve login.html, register.html, home.html, etc.
  # ============================================================
  usuarios_web:
    build: ./usuarios/backend
    command: python usuarios_webserver.py
    ports:
      - "5000:5000"
    volumes:
      - ./usuarios/frontend:/app/frontend
    restart: always
    networks:
      - bendicion_net


  # ============================================================
  # BACKEND DE WALLET (API)
  # Puerto: 5002
  # Maneja creación de wallets, consulta de claves, vinculación a usuarios
  # ============================================================
  wallet_api:
    build: ./wallet/backend
    command: python wallet_server.py
    ports:
      - "5002:5002"
    volumes:
      - ./wallet/backend/wallet_server.py:/app/wallet_server.py
      - ./wallet/backend/wallet.py:/app/wallet.py
      - ./wallet/backend/wallet_manager.py:/app/wallet_manager.py
      - ./wallet/backend/wallets.json:/app/wallets.json
      - ./usuarios/backend/database.json:/app/database.json
    restart: always
    networks:
      - bendicion_net


  # ============================================================
  # FRONTEND DE WALLET (WEB)
  # Puerto: 5003
  # Sirve wallet.html y archivos estáticos
  # ============================================================
  wallet_web:
    build: ./wallet/backend
    command: python wallet_webserver.py
    ports:
      - "5003:5003"
    volumes:
      - ./wallet/backend/wallet_webserver.py:/app/wallet_webserver.py
      - ./wallet/frontend:/app/frontend
    restart: always
    networks:
      - bendicion_net

  # ============================================================
  # BLOCKCHAIN (API)
  # Puerto: 5004
  # Maneja transacciones firmadas, bloques, saldos y minería
  # ============================================================
  blockchain_api:
    build: ./Blockchain/bakend
    command: python blockchain_server.py
    ports:
      - "5004:5004"
    volumes:
      - ./Blockchain/bakend/blockchain_server.py:/app/blockchain_server.py
      - ./Blockchain/bakend/blockchain.py:/app/blockchain.py
      - ./Blockchain/bakend/blockchain_blocks.py:/app/blockchain_blocks.py
      - ./Blockchain/bakend/archive:/app/archive
    restart: always
    networks:
      - bendicion_net
  
  # ============================================================
  # BLOCKCHAIN (WEB)
  # Puerto: 5005
  #  # Sirve blockchain.html y otros archivos estáticos
  # ============================================================
  blockchain_web:
    build: ./Blockchain/bakend
    command: python blockchain_webserver.py
    ports:
      - "5005:5005"
    volumes:
      - ./Blockchain/bakend/blockchain_webserver.py:/app/blockchain_webserver.py
      - ./Blockchain/frontend:/app/frontend
    restart: always
    networks:
      - bendicion_net
 
  # ============================================================
  # ADMIN (API)
  # Puerto: 5010
  # Maneja permisos, panel de administración, gestión de usuarios
  # ============================================================
  admin_api:
    build: ./admin/backend
    command: python admin_server.py
    ports:
      - "5010:5010"
    volumes:
      - ./admin/backend/admin_server.py:/app/admin_server.py
      - ./admin/backend/admin_manager.py:/app/admin_manager.py
      - ./usuarios/backend/database.json:/app/database.json
    restart: always
    networks:
      - bendicion_net


  # ============================================================
  # ADMIN (WEB)
  # Puerto: 5011
  # Sirve admin.html, dashboard.html y archivos estáticos
  # ============================================================
  admin_web:
    build: ./admin/backend
    command: python admin_webserver.py
    ports:
      - "5011:5011"
    volumes:
      - ./admin/backend/admin_webserver.py:/app/admin_webserver.py
      - ./admin/frontend:/app/frontend
      - ./usuarios/backend/database.json:/app/database.json
    restart: always
    networks:
      - bendicion_net

  # ============================================================
  # RED COMPARTIDA ENTRE TODOS LOS SERVICIOS
  # Permite que usuarios_api, usuarios_web, wallet_api y wallet_web
  # se comuniquen entre sí sin problemas
  # ============================================================
  networks:
    bendicion_net:
        driver: bridge
