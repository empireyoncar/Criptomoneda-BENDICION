<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Staking - Bendición</title>

    <style>
        body {
            background: #0b0e11;
            color: #eaecef;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #181a20;
            padding: 30px;
            border-radius: 14px;
            width: 380px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #f0b90b;
        }

        .wallet-box {
            background: #0e1117;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f0b90b;
        }

        .wallet-line {
            font-size: 14px;
            margin: 4px 0;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #2b3139;
            background: #0e1117;
            color: #eaecef;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f0b90b;
        }

        #rewardBox {
            margin-top: 12px;
            padding: 12px;
            background: #0e1117;
            border-left: 4px solid #f0b90b;
            border-radius: 6px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #f0b90b;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover {
            background: #d9a20a;
        }

        button:disabled {
            background: #8a7a3a;
            cursor: not-allowed;
        }

        #toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 20px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
            animation: fadeIn 0.3s ease;
        }

        .toast-ok {
            background: #1f4b2c;
            color: #a6f3c0;
        }

        .toast-err {
            background: #4b1f1f;
            color: #f3a6a6;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Staking Bendición</h2>

        <!-- WALLET -->
    <section class="card">
        <h2>Wallet</h2>
        <p>ID Usuario: <span id="userId"></span></p>
        <p>Address(wallet): <span id="address" class="mono"></span></p>
        <p>Saldo:<span id="balance"></span> BEND</p>
        <button id="btnGetBalance" class="btn btn-primary">Ver Saldo</button>
    </section>

    <label>Monto a stakear</label>
    <input type="number" id="amount" placeholder="Ej: 100">

    <label>Tiempo</label>
    <select id="days">
        <option value="30" data-don="6.6">30 días — Recompensa: 6.6 DON</option>
        <option value="60" data-don="15">60 días — Recompensa: 15 DON</option>
        <option value="90" data-don="25">90 días — Recompensa: 25 DON</option>
        <option value="180" data-don="55">180 días — Recompensa: 55 DON</option>
        <option value="365" data-don="120">365 días — Recompensa: 120 DON</option>
    </select>

    <div id="rewardBox">
        <p id="rewardText"></p>
    </div>

    <button id="btnStake">Iniciar Staking</button>

    <section class="card">
        <h2>Navegación</h2>
        <p>ir panel principal</p>
        <button id="btnGohome" class="btn btn-primary">Volver a Home</button>
    </section>

</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
const API_BLOCKCHAIN = "https://empireyoncar.duckdns.org/CriptoBendicion/blockchain";
const API_WALLET = "https://empireyoncar.duckdns.org/CriptoBendicion/wallet_api";
const ADMIN_USER_ID = "001";

const amountInput = document.getElementById("amount");
const daysSelect = document.getElementById("days");
const rewardBox = document.getElementById("rewardBox");
const rewardText = document.getElementById("rewardText");
const btn = document.getElementById("btnStake");
const toast = document.getElementById("toast");

const userIdEl = document.getElementById("userId");

// -------------------------
//   CARGAR WALLET
// -------------------------
const address = localStorage.getItem("address");
const publicKey = localStorage.getItem("public_key");

if (!address || !publicKey) {
    alert("Primero configura tu wallet en la página principal.");
    window.location.href = "/CriptoBendicion/wallet";
} else {
    document.getElementById("address").textContent = address;
}

// -------------------------
//   LOGIN OBLIGATORIO
// -------------------------
let userId = localStorage.getItem("user_id");
if (!userId) {
    alert("Debes iniciar sesión primero.");
    window.location.href = "/CriptoBendicion/login";
} else {
    userIdEl.textContent = userId;
}

// -------------------------
//   VER BALANCE
// -------------------------
document.getElementById("btnGetBalance").onclick = async () => {
    try {
        const res = await fetch(`${API_BLOCKCHAIN}/wallet/${address}`);
        const data = await res.json();
        document.getElementById("balance").textContent =
            data && typeof data.balance !== "undefined" ? data.balance : "Error";
    } catch (err) {
        console.error(err);
        alert("Error al obtener el balance.");
    }
};

// -------------------------
//   CÁLCULO DE RECOMPENSA
// -------------------------
function calcReward() {
    const amount = parseFloat(amountInput.value);
    const days = parseInt(daysSelect.value);
    const donReward = parseFloat(daysSelect.selectedOptions[0].dataset.don);

    if (!amount || amount <= 0) {
        rewardBox.style.display = "none";
        return;
    }

    const reward = (amount / 1000) * donReward;

    rewardText.innerHTML = `
        <b>Recompensa estimada:</b> ${reward.toFixed(4)} DON<br>
        <small>Duración: ${days} días — Recompensa base: ${donReward} DON por cada 1000 BEND</small>
    `;

    rewardBox.style.display = "block";
}

amountInput.oninput = calcReward;
daysSelect.onchange = calcReward;

// boton de crear staking

const API_STAKING = "https://empireyoncar.duckdns.org/CriptoBendicion/staking_api";

function sortDeep(value) {
    if (Array.isArray(value)) {
        return value.map(sortDeep);
    }
    if (value && typeof value === "object") {
        const ordered = {};
        Object.keys(value)
            .sort()
            .forEach((key) => {
                ordered[key] = sortDeep(value[key]);
            });
        return ordered;
    }
    return value;
}

function canonicalJson(obj) {
    return JSON.stringify(sortDeep(obj));
}

function toFixedHex(value, length) {
    return value.toString(16).padStart(length, "0");
}

function getSigningStorageKey() {
    return `tx_private_key_${address}`;
}

function getPrivateKeyForSigning() {
    const key = sessionStorage.getItem(getSigningStorageKey());
    if (key) {
        return key;
    }

    const entered = prompt("Introduce tu clave privada HEX para firmar el staking:");
    if (!entered) {
        return null;
    }

    const normalized = entered.trim().toLowerCase();
    if (!/^[0-9a-f]{64}$/.test(normalized)) {
        throw new Error("La clave privada debe tener 64 caracteres hex.");
    }

    sessionStorage.setItem(getSigningStorageKey(), normalized);
    return normalized;
}

function derivePublicKeyAndAddress(privateKeyHex) {
    const ec = new elliptic.ec("secp256k1");
    const key = ec.keyFromPrivate(privateKeyHex, "hex");
    const pub = key.getPublic();
    const publicKeyHex =
        pub.getX().toString(16).padStart(64, "0") +
        pub.getY().toString(16).padStart(64, "0");
    const derivedAddress = CryptoJS.SHA256(publicKeyHex).toString();
    return { publicKeyHex, derivedAddress };
}

function signTxPayload(privateKeyHex, payload) {
    const ec = new elliptic.ec("secp256k1");
    const key = ec.keyFromPrivate(privateKeyHex, "hex");
    const hashHex = CryptoJS.SHA256(canonicalJson(payload)).toString();
    const sig = key.sign(hashHex, "hex", { canonical: true });
    return toFixedHex(sig.r, 64) + toFixedHex(sig.s, 64);
}

async function getCurrentNonce(senderAddress) {
    const nonceRes = await fetch(`${API_BLOCKCHAIN}/wallet/${senderAddress}/nonce`);
    if (!nonceRes.ok) {
        throw new Error(`No se pudo obtener nonce (${nonceRes.status})`);
    }
    const nonceData = await nonceRes.json();
    return Number(nonceData.nonce);
}

async function getAdminWalletAddress() {
    const res = await fetch(`${API_WALLET}/user_wallet/${ADMIN_USER_ID}`);
    if (!res.ok) {
        throw new Error("No se pudo obtener la wallet del administrador");
    }
    const data = await res.json();
    if (!data.wallet) {
        throw new Error("El administrador no tiene wallet configurada");
    }
    return data.wallet;
}

async function parseJsonResponse(response, fallbackMessage) {
    const rawText = await response.text();

    if (!rawText) {
        if (!response.ok) {
            throw new Error(fallbackMessage);
        }
        return {};
    }

    try {
        return JSON.parse(rawText);
    } catch {
        throw new Error(`${fallbackMessage}: ${rawText}`);
    }
}

document.getElementById("btnStake").onclick = async () => {
    const amount = Number(document.getElementById("amount").value);
    const days = parseInt(document.getElementById("days").value);
    const userId = localStorage.getItem("user_id");
    const wallet = localStorage.getItem("address");

    if (!Number.isFinite(amount) || amount <= 0 || !Number.isInteger(amount)) {
        alert("Ingresa un monto entero válido en satichis.");
        return;
    }

    try {
        const adminWallet = await getAdminWalletAddress();
        const privateKeyHex = getPrivateKeyForSigning();
        if (!privateKeyHex) {
            alert("Firma cancelada por el usuario.");
            return;
        }

        const signer = derivePublicKeyAndAddress(privateKeyHex);
        if (signer.derivedAddress !== wallet) {
            sessionStorage.removeItem(getSigningStorageKey());
            sessionStorage.removeItem("tx_private_key");
            alert(`La clave privada no corresponde a tu wallet activa. Wallet activa: ${wallet}. Wallet de la clave: ${signer.derivedAddress}`);
            return;
        }

        const nonce = await getCurrentNonce(wallet);
        const txPayload = {
            from: wallet,
            to: adminWallet,
            amount: amount,
            nonce: nonce,
            metadata: {
                type: "staking_lock",
                user_id: userId,
                days: days
            }
        };

        const signature = signTxPayload(privateKeyHex, txPayload);
        const txRes = await fetch(`${API_BLOCKCHAIN}/send_tx`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                tx: {
                    ...txPayload,
                    public_key: signer.publicKeyHex,
                    signature: signature
                }
            })
        });

        const txData = await parseJsonResponse(txRes, "Error al transferir Bendición en la blockchain");
        if (!txRes.ok || txData.error) {
            throw new Error(txData.error || "Error al transferir Bendición en la blockchain");
        }

        const commitRes = await fetch(`${API_BLOCKCHAIN}/commit`, { method: "POST" });
        const commitData = await parseJsonResponse(commitRes, "Error al confirmar la transacción en blockchain");
        if (!commitRes.ok || commitData.error) {
            throw new Error(commitData.error || "Error al confirmar la transacción en blockchain");
        }

        const payload = {
            user_id: userId,
            wallet: wallet,
            amount: amount,
            days: days,
            transfer_tx_id: txData.tx_id
        };

        const res = await fetch(`${API_STAKING}/Staking/create`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await parseJsonResponse(res, "Error al registrar el staking");

        if (!res.ok || data.error) {
            alert("Error: " + data.error);
        } else {
            alert("Staking creado. ID: " + data.stake_id);
        }

    } catch (err) {
        alert("Error: " + (err.message || err));
        console.error(err);
    }
};

// -------------------------
//   NAVEGACIÓN
// -------------------------
document.getElementById("btnGohome").onclick = () => {
    window.location.href = "/CriptoBendicion/home";
};
</script>


</body>
</html>
