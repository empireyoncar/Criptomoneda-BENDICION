version: "3.9"

services:

  usuarios:
    build: ./usuarios/backend
    container_name: bendicion_usuarios
    command: python login_server.py
    ports:
      - "5001:5001"
    volumes:
      - ./database.json:/app/db/database.json
    restart: always
    networks:
      - bendicion_net

networks:
  bendicion_net:
    driver: bridge
